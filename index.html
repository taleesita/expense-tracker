        const ReceiptScanner = ({ onCapture, onFile, onClose }) => {
            const [dragActive, setDragActive] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [cameraActive, setCameraActive] = useState(false);

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        setCameraActive(true);
                    }
                } catch (err) {
                    alert('Unable to access camera');
                }
            };

            const capturePhoto = () => {
                if (videoRef.current && canvasRef.current) {
                    const context = canvasRef.current.getContext('2d');
                    canvasRef.current.width = videoRef.current.videoWidth;
                    canvasRef.current.height = videoRef.current.videoHeight;
                    context.drawImage(videoRef.current, 0, 0);
                    canvasRef.current.toBlob((blob) => {
                        onCapture(blob);
                        onClose();
                    });
                }
            };

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(e.type !== 'dragleave');
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files?.[0]) {
                    onFile(e.dataTransfer.files[0]);
                    onClose();
                }
            };

            return (
                <div className="bg-gray-100 rounded-lg p-4 mb-4">
                    {!cameraActive ? (
                        <>
                            <div
                                onDragEnter={handleDrag}
                                onDragLeave={handleDrag}
                                onDragOver={handleDrag}
                                onDrop={handleDrop}
                                className={`border-2 border-dashed rounded-lg p-6 text-center transition ${dragActive ? 'border-blue-600 bg-blue-50' : 'border-gray-400'}`}
                            >
                                <p className="text-gray-600 mb-2">Drag and drop a receipt image here</p>
                                <div className="flex gap-2 justify-center">
                                    <button
                                        onClick={startCamera}
                                        className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700"
                                    >
                                        <CameraIcon size={18} /> Take Photo
                                    </button>
                                    <input
                                        type="file"
                                        accept="image/*"
                                        onChange={(e) => e.target.files?.[0] && onFile(e.target.files[0])}
                                        className="hidden"
                                        id="scanner-file"
                                    />
                                    <label htmlFor="scanner-file" className="flex items-center gap-2 bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 cursor-pointer">
                                        <Upload2Icon size={18} /> Upload
                                    </label>
                                </div>
                            </div>
                        </>
                    ) : (
                        <>
                            <video ref={videoRef} autoPlay playsInline className="w-full rounded-lg mb-2" />
                            <canvas ref={canvasRef} className="hidden" />
                            <div className="flex gap-2">
                                <button
                                    onClick={capturePhoto}
                                    className="flex-1 bg-green-600 text-white py-2 rounded-lg font-medium hover:bg-green-700"
                                >
                                    Capture
                                </button>
                                <button
                                    onClick={() => {
                                        if (videoRef.current?.srcObject) {
                                            videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                                        }
                                        setCameraActive(false);
                                    }}
                                    className="flex-1 bg-gray-600 text-white py-2 rounded-lg font-medium hover:bg-gray-700"
                                >
                                    Close
                                </button>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const AccountTabView = ({ accountId, expenses, onUpdate, onReconcile, onDelete, onEdit }) => {
            const account = getAccountById(accountId);
            const accountExpenses = expenses.filter(e => e.account === accountId);
            const [isLocked, setIsLocked] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            // Only count 2026+ expenses for reconciliation progress
            const isRecent = (e) => {
                const d = parseDateToISO(e.date);
                return d >= '2026-01-01';
            };
            const recentExpenses = accountExpenses.filter(isRecent);
            const reconciledExpenses = recentExpenses.filter(e => e.reconciled);
            const unlockedExpenses = recentExpenses.filter(e => !e.reconciledLocked && !e.reconciled);

            const filteredExpenses = accountExpenses.filter(e =>
                e.merchant.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const isCreditCard = CREDIT_CARDS.some(c => c.id === accountId);
            const calcBalance = (sum, e) => {
                if (isCreditCard) {
                    if (e.category === 'card_payment') return sum - e.amount;
                    return e.txnType === 'charge' ? sum + e.amount : sum - e.amount;
                } else {
                    return (e.txnType === 'deposit' || e.txnType === 'credit_refund') ? sum + e.amount : sum - e.amount;
                }
            };
            const total = accountExpenses.reduce(calcBalance, 0);
            const reconciledTotal = reconciledExpenses.reduce(calcBalance, 0);
            const recentTotal = recentExpenses.reduce(calcBalance, 0);
            const progress = recentExpenses.length > 0 ? (reconciledExpenses.length / recentExpenses.length) * 100 : 0;

            const handleClearUnlocked = () => {
                if (confirm(`Clear ${unlockedExpenses.length} unreconciled items?`)) {
                    unlockedExpenses.forEach(e => {
                        onReconcile(e.rowIndex, false);
                    });
                }
            };

            if (!account) return null;

            return (
                <div className="space-y-4">
                    <div className="bg-white p-4 rounded-lg border border-gray-200">
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-bold text-lg">{account.name}</h3>
                            <button
                                onClick={() => setIsLocked(!isLocked)}
                                className={`flex items-center gap-1 px-3 py-1 rounded-lg font-medium text-sm transition ${isLocked ? 'bg-amber-100 text-amber-700' : 'bg-gray-200 text-gray-700'}`}
                            >
                                <LockIcon size={16} /> {isLocked ? 'Locked' : 'Unlocked'}
                            </button>
                        </div>
                        <div className="text-2xl font-bold mb-3">{total < 0 ? '-' : ''}${fmt(total)}</div>
                        <div className="w-full bg-gray-200 rounded-full h-2 mb-2">
                            <div
                                className={`h-2 rounded-full transition-all ${isLocked ? 'bg-amber-500' : ''}`}
                                style={{
                                    width: `${progress}%`,
                                    backgroundColor: isLocked ? '#D97706' : (account.color || '#3B82F6')
                                }}
                            />
                        </div>
                        <div className="text-sm text-gray-600 mb-3">{reconciledExpenses.length} of {recentExpenses.length} reconciled (2026)</div>
                        {!isLocked && unlockedExpenses.length > 0 && (
                            <button
                                onClick={handleClearUnlocked}
                                className="w-full bg-red-100 text-red-700 py-2 rounded-lg font-medium hover:bg-red-200 text-sm"
                            >
                                Clear {unlockedExpenses.length} Unreconciled
                            </button>
                        )}
                    </div>

                    <div className="flex gap-2 bg-white p-3 rounded-lg">
                        <SearchIcon size={20} className="text-gray-400" />
                        <input
                            type="text"
                            placeholder="Search..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="flex-1 outline-none"
                        />
                    </div>

                    <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                        {filteredExpenses.length === 0 ? (
                            <div className="p-4 text-center text-gray-500">No expenses</div>
                        ) : (
                            filteredExpenses.map((expense, idx) => (
                                <ExpenseRow
                                    key={expense.rowIndex}
                                    expense={expense}
                                    onDelete={onDelete}
                                    onUpdate={(updated) => onUpdate(updated.rowIndex, updated)}
                                    onReconcile={onReconcile}
                                    onEdit={onEdit}
                                    showReconcile={true}
                                    isLocked={isLocked}
                                    hideAccount={true}
                                    showDateSeparator={idx === 0 || getDateKey(expense) !== getDateKey(filteredExpenses[idx - 1])}
                                />
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const HomeTab = ({ expenses, onEdit }) => {
            const [chartFilter, setChartFilter] = useState('');  // '' = all, 'YYYY' = year, 'YYYY-MM' = month, 'YYYY-Q1' etc
            const [hoveredSlice, setHoveredSlice] = useState(null);

            // Get available years and months from expenses
            const { years, monthsByYear } = useMemo(() => {
                const ySet = new Set();
                const mMap = {};
                expenses.forEach(e => {
                    const d = parseDateToISO(e.date || e.timestamp);
                    if (d) {
                        const y = d.substring(0, 4);
                        const m = d.substring(0, 7);
                        ySet.add(y);
                        if (!mMap[y]) mMap[y] = new Set();
                        mMap[y].add(m);
                    }
                });
                const years = Array.from(ySet).sort().reverse();
                const monthsByYear = {};
                years.forEach(y => { monthsByYear[y] = Array.from(mMap[y]).sort(); });
                return { years, monthsByYear };
            }, [expenses]);

            // Filter expenses by selected filter
            const filteredExpenses = useMemo(() => {
                if (!chartFilter) return expenses;
                // Quarter filter: YYYY-Q1, YYYY-Q2, etc.
                const qMatch = chartFilter.match(/^(\d{4})-Q(\d)$/);
                if (qMatch) {
                    const [, yr, q] = qMatch;
                    const startMonth = (parseInt(q) - 1) * 3 + 1;
                    const months = [startMonth, startMonth + 1, startMonth + 2].map(m => `${yr}-${String(m).padStart(2, '0')}`);
                    return expenses.filter(e => {
                        const d = parseDateToISO(e.date || e.timestamp);
                        return d && months.some(m => d.startsWith(m));
                    });
                }
                // Year or month filter
                return expenses.filter(e => {
                    const d = parseDateToISO(e.date || e.timestamp);
                    return d && d.startsWith(chartFilter);
                });
            }, [expenses, chartFilter]);

            const byCategory = {};
            CATEGORIES.forEach(cat => {
                byCategory[cat.id] = {
                    label: cat.name,
                    value: 0,
                    emoji: cat.emoji,
                    color: cat.color
                };
            });

            filteredExpenses.forEach(e => {
                if (byCategory[e.category]) {
                    if (e.txnType === 'charge' && e.category !== 'card_payment' && e.category !== 'transfer') {
                        byCategory[e.category].value += e.amount;
                    }
                }
            });

            const categoryData = Object.values(byCategory)
                .filter(c => c.value > 0)
                .sort((a, b) => b.value - a.value);

            const creditCardTotals = {};
            CREDIT_CARDS.forEach(card => {
                const cardExpenses = expenses.filter(e => e.account === card.id);
                creditCardTotals[card.id] = {
                    ...card,
                    total: cardExpenses.reduce((sum, e) => {
                        // Card payments always reduce CC balance, regardless of which column
                        if (e.category === 'card_payment') return sum - e.amount;
                        // Charges add to balance owed, deposits/credits reduce it
                        if (e.txnType === 'charge') return sum + e.amount;
                        return sum - e.amount;
                    }, 0)
                };
            });

            const bankTotals = {};
            BANK_ACCOUNTS.forEach(bank => {
                const bankExpenses = expenses.filter(e => e.account === bank.id);
                bankTotals[bank.id] = {
                    ...bank,
                    total: bankExpenses.reduce((sum, e) => {
                        // Deposits/income add to bank balance, charges/debits reduce it
                        if (e.txnType === 'deposit' || e.txnType === 'credit_refund') return sum + e.amount;
                        return sum - e.amount;
                    }, 0)
                };
            });

            const recent = expenses.slice(0, 5);

            const totalCCBalance = Object.values(creditCardTotals).reduce((sum, c) => sum + c.total, 0);
            const totalBankBalance = Object.values(bankTotals).reduce((sum, b) => sum + b.total, 0);

            return (
                <div className="space-y-4 pb-20">
                    <div className="flex gap-3">
                        <div className="flex-1 bg-gradient-to-r from-red-500 to-red-600 text-white p-4 rounded-lg">
                            <p className="text-[10px] opacity-80 uppercase tracking-wide">Credit Cards</p>
                            <p className="text-xl font-bold mt-0.5">${fmt(totalCCBalance)}</p>
                            <p className="text-[10px] opacity-70 mt-0.5">{totalCCBalance > 0 ? 'owed' : totalCCBalance < 0 ? 'credit' : 'clear'}</p>
                        </div>
                        <div className="flex-1 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white p-4 rounded-lg">
                            <p className="text-[10px] opacity-80 uppercase tracking-wide">Bank Accounts</p>
                            <p className="text-xl font-bold mt-0.5">${fmt(totalBankBalance)}</p>
                            <p className="text-[10px] opacity-70 mt-0.5">{totalBankBalance >= 0 ? 'balance' : 'overdrawn'}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <h3 className="font-bold text-lg mb-2">Credit Cards</h3>
                            <div className="space-y-2">
                                {Object.values(creditCardTotals).map(card => (
                                    <div key={card.id} className="bg-white p-3 rounded-lg border border-gray-200 flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <div className="w-2 h-8 rounded-full" style={{ backgroundColor: card.color }} />
                                            <div>
                                                <span className="font-medium text-sm">{card.shortName}</span>
                                                <p className="text-xs text-gray-400">···{card.last4}</p>
                                            </div>
                                        </div>
                                        <span className={`font-bold ${card.total > 0 ? 'text-red-600' : card.total < 0 ? 'text-green-600' : 'text-gray-500'}`}>{card.total < 0 ? '-' : ''}${fmt(card.total)}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div>
                            <h3 className="font-bold text-lg mb-2">Bank Accounts</h3>
                            <div className="space-y-2">
                                {Object.values(bankTotals).map(bank => (
                                    <div key={bank.id} className="bg-white p-3 rounded-lg border border-gray-200 flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <div className="w-2 h-8 rounded-full" style={{ backgroundColor: bank.color }} />
                                            <div>
                                                <span className="font-medium text-sm">{bank.shortName}</span>
                                                <p className="text-xs text-gray-400">···{bank.last4}</p>
                                            </div>
                                        </div>
                                        <span className={`font-bold ${bank.total < 0 ? 'text-red-600' : ''}`}>{bank.total < 0 ? '-' : ''}${fmt(bank.total)}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {categoryData.length > 0 && (() => {
                        const totalValue = categoryData.reduce((sum, c) => sum + c.value, 0);
                        return (
                        <div>
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold text-lg">Spending by Category</h3>
                                <select
                                    value={chartFilter}
                                    onChange={(e) => { setChartFilter(e.target.value); setHoveredSlice(null); }}
                                    className="text-sm border border-gray-200 rounded-lg px-2 py-1 bg-white"
                                >
                                    <option value="">All Time</option>
                                    {years.map(y => (
                                        <React.Fragment key={y}>
                                            <option value={y}>{y} (Full Year)</option>
                                            <option value={`${y}-Q1`}>&nbsp;&nbsp;Q1 (Jan–Mar)</option>
                                            <option value={`${y}-Q2`}>&nbsp;&nbsp;Q2 (Apr–Jun)</option>
                                            <option value={`${y}-Q3`}>&nbsp;&nbsp;Q3 (Jul–Sep)</option>
                                            <option value={`${y}-Q4`}>&nbsp;&nbsp;Q4 (Oct–Dec)</option>
                                            {(monthsByYear[y] || []).map(m => {
                                                const mo = parseInt(m.split('-')[1]);
                                                const label = new Date(y, mo - 1).toLocaleString('en-US', { month: 'short' });
                                                return <option key={m} value={m}>&nbsp;&nbsp;&nbsp;&nbsp;{label} {y}</option>;
                                            })}
                                        </React.Fragment>
                                    ))}
                                </select>
                            </div>
                            <div className="bg-white p-4 rounded-lg border border-gray-200">
                                <div className="flex flex-col md:flex-row items-center gap-4">
                                    <div className="relative" style={{ width: 200, height: 200, flexShrink: 0 }}>
                                        <svg viewBox="0 0 200 200" style={{ width: '100%', height: '100%' }}>
                                            {categoryData.map((cat, i) => {
                                                const angle = (cat.value / totalValue) * 360;
                                                const startAngle = categoryData.slice(0, i).reduce((s, c) => s + (c.value / totalValue) * 360, 0);
                                                const endAngle = startAngle + angle;
                                                const isHovered = hoveredSlice === i;
                                                const r = isHovered ? 88 : 82;
                                                const startRad = (startAngle - 90) * Math.PI / 180;
                                                const endRad = (endAngle - 90) * Math.PI / 180;
                                                const x1 = 100 + r * Math.cos(startRad);
                                                const y1 = 100 + r * Math.sin(startRad);
                                                const x2 = 100 + r * Math.cos(endRad);
                                                const y2 = 100 + r * Math.sin(endRad);
                                                const largeArc = angle > 180 ? 1 : 0;
                                                const pathData = `M 100 100 L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
                                                return (
                                                    <path
                                                        key={i}
                                                        d={pathData}
                                                        fill={cat.color}
                                                        stroke="white"
                                                        strokeWidth="2"
                                                        onMouseEnter={() => setHoveredSlice(i)}
                                                        onMouseLeave={() => setHoveredSlice(null)}
                                                        onClick={() => setHoveredSlice(hoveredSlice === i ? null : i)}
                                                        style={{ cursor: 'pointer', transition: 'all 0.15s' }}
                                                    />
                                                );
                                            })}
                                        </svg>
                                        {hoveredSlice !== null && categoryData[hoveredSlice] && (
                                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                                <div className="bg-white/90 rounded-lg shadow px-3 py-1.5 text-center">
                                                    <p className="text-xs font-medium">{categoryData[hoveredSlice].emoji} {categoryData[hoveredSlice].label}</p>
                                                    <p className="text-sm font-bold">${fmt(categoryData[hoveredSlice].value)}</p>
                                                    <p className="text-[10px] text-gray-500">{((categoryData[hoveredSlice].value / totalValue) * 100).toFixed(1)}%</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex-1 w-full max-h-48 overflow-y-auto space-y-1">
                                        {categoryData.map((cat, i) => (
                                            <div
                                                key={cat.label}
                                                className={`flex justify-between text-xs py-1 px-2 rounded cursor-pointer transition ${hoveredSlice === i ? 'bg-gray-100' : ''}`}
                                                onMouseEnter={() => setHoveredSlice(i)}
                                                onMouseLeave={() => setHoveredSlice(null)}
                                            >
                                                <span className="flex items-center gap-1.5">
                                                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: cat.color }} />
                                                    <span className="text-sm">{cat.emoji}</span>
                                                    <span className="truncate">{cat.label}</span>
                                                </span>
                                                <span className="font-medium ml-2 flex-shrink-0">${fmt(cat.value)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="mt-2 pt-2 border-t border-gray-100 text-right">
                                    <span className="text-sm text-gray-500">Total: </span>
                                    <span className="text-sm font-bold">${fmt(totalValue)}</span>
                                </div>
                            </div>
                        </div>
                        );
                    })()}

                    {recent.length > 0 && (
                        <div>
                            <h3 className="font-bold text-lg mb-2">Recent</h3>
                            <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                                {recent.map((expense, idx) => (
                                    <ExpenseRow
                                        key={expense.rowIndex}
                                        expense={expense}
                                        onDelete={() => {}}
                                        onUpdate={() => {}}
                                        onEdit={onEdit}
                                        showReconcile={false}
                                        showDateSeparator={idx === 0 || getDateKey(expense) !== getDateKey(recent[idx - 1])}
                                    />
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AllTab = ({ expenses, onDelete, onUpdate, onEdit }) => {
            const [searchTerm, setSearchTerm] = useState('');

            const filtered = expenses.filter(e =>
                e.merchant.toLowerCase().includes(searchTerm.toLowerCase()) ||
                e.category.includes(searchTerm.toLowerCase())
            );

            return (
                <div className="pb-20">
                    <div className="sticky top-0 bg-white p-3 border-b border-gray-200 flex gap-2 z-10">
                        <SearchIcon size={20} className="text-gray-400" />
                        <input
                            type="text"
                            placeholder="Search..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="flex-1 outline-none"
                        />
                    </div>
                    <div className="bg-white border border-gray-200 overflow-hidden">
                        {filtered.length === 0 ? (
                            <div className="p-4 text-center text-gray-500">No expenses</div>
                        ) : (
                            filtered.map((expense, idx) => (
                                <ExpenseRow
                                    key={expense.rowIndex}
                                    expense={expense}
                                    onDelete={onDelete}
                                    onUpdate={(updated) => onUpdate(updated.rowIndex, updated)}
                                    onEdit={onEdit}
                                    showReconcile={false}
                                    showDateSeparator={idx === 0 || getDateKey(expense) !== getDateKey(filtered[idx - 1])}
                                />
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const SettingsDropdown = ({ user, onLogout }) => {
            const [open, setOpen] = useState(false);

            return (
                <div className="relative">
                    <button
                        onClick={() => setOpen(!open)}
                        className="p-1 hover:bg-gray-200 rounded"
                    >
                        <span style={{ fontSize: '16px' }}>⚙️</span>
                    </button>
                    {open && (
                        <div className="absolute right-0 mt-2 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden z-20">
                            <div className="px-4 py-3 border-b border-gray-200">
                                <div className="flex items-center gap-2">
                                    {user?.picture && <img src={user.picture} alt="" className="w-8 h-8 rounded-full" />}
                                    <div>
                                        <p className="font-medium">{user?.name}</p>
                                        <p className="text-xs text-gray-500">{user?.email}</p>
                                    </div>
                                </div>
                            </div>
                            <button
                                onClick={() => {
                                    onLogout();
                                    setOpen(false);
                                }}
                                className="w-full px-4 py-2 text-left text-red-600 hover:bg-red-50 flex items-center gap-2"
                            >
                                <LogOutIcon size={18} /> Sign Out
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // ============ MAIN APP ============
        const App = () => {
            const { user, token, login, logout } = useGoogleAuth();
            const { expenses, loading, fetchExpenses, appendExpense, updateExpense, deleteExpense } = useGoogleSheets(token);
            const { push: pushUndo, undo: undoAction, canUndo } = useUndoStack();

            const [activeTab, setActiveTab] = useState('home');
            const [showAddModal, setShowAddModal] = useState(false);
            const [editExpense, setEditExpense] = useState(null);
            const [selectedCard, setSelectedCard] = useState(CREDIT_CARDS[0]?.id || '');
            const [selectedBank, setSelectedBank] = useState(BANK_ACCOUNTS[0]?.id || '');
            const [toast, setToast] = useState('');

            const handleEditExpense = (expense) => {
                setEditExpense(expense);
                setShowAddModal(true);
            };

            const handleCloseModal = () => {
                setShowAddModal(false);
                setEditExpense(null);
            };

            const handleQuickMetrocard = async () => {
                // Get current date in ET timezone
                const etDate = new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
                pushUndo(expenses);
                await appendExpense({
                    merchant: 'Metrocard',
                    amount: 3.00,
                    category: 'transit',
                    account: 'reserve_chase',
                    notes: '',
                    receipt: '',
                    txnType: 'charge',
                    isCredit: false,
                    originalCurrency: 'USD',
                    originalAmount: 3.00,
                    person: user?.name || 'Taly',
                    date: etDate,
                });
                setToast('🚇 Metrocard added');
                setTimeout(() => setToast(''), 5000);
            };

            useEffect(() => {
                if (user && token) {
                    fetchExpenses();
                }
            }, [user, token, fetchExpenses]);

            const handleAddExpense = async (expenseData) => {
                pushUndo(expenses);
                await appendExpense(expenseData);
                setToast('Expense added');
                setTimeout(() => setToast(''), 5000);
            };

            const handleUpdateExpense = async (rowIndex, updated) => {
                pushUndo(expenses);
                await updateExpense(rowIndex, updated);
            };

            const handleDeleteExpense = async (rowIndex) => {
                if (confirm('Delete this expense?')) {
                    pushUndo(expenses);
                    await deleteExpense(rowIndex);
                    setToast('Expense deleted');
                    setTimeout(() => setToast(''), 5000);
                }
            };

            const handleReconcile = async (rowIndex, reconciled) => {
                const expense = expenses.find(e => e.rowIndex === rowIndex);
                if (expense) {
                    pushUndo(expenses);
                    // Save reconcile state to localStorage (no sheet column for this)
                    try { localStorage.setItem('rec_' + rowIndex, JSON.stringify(reconciled)); } catch {}
                    // Update in-memory state without rewriting the sheet row
                    const updated = expenses.map(e => e.rowIndex === rowIndex ? { ...e, reconciled } : e);
                    // Trigger re-render via fetchExpenses replacement
                    await fetchExpenses(true);
                }
            };

            const handleUndo = async () => {
                const previousState = undoAction();
                if (previousState) {
                    setToast('Undo successful');
                    setTimeout(() => setToast(''), 5000);
                }
            };

            if (!user || !token) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center px-4" style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }}>
                        <div className="bg-white rounded-2xl p-8 shadow-lg border border-gray-100 max-w-sm w-full text-center">
                            <div className="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <LockIcon size={24} className="text-blue-500" />
                            </div>
                            <h1 className="text-xl font-bold text-gray-900 mb-1">Expense Tracker</h1>
                            <p className="text-sm text-gray-400 mb-6">Sign in with Google to continue</p>
                            <button
                                onClick={login}
                                className="w-full flex items-center justify-center gap-3 py-3 px-4 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition-colors"
                            >
                                <svg width="18" height="18" viewBox="0 0 24 24">
                                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                </svg>
                                Sign in with Google
                            </button>
                            <p className="text-xs text-gray-300 mt-4">Restricted to authorized users only</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-gray-50">
                    {/* Header */}
                    <div className="sticky top-0 bg-white border-b border-gray-200 p-4 flex justify-between items-center z-30">
                        <div>
                            <h1 className="text-xl font-bold">Expenses</h1>
                            <p className="text-xs text-gray-400">Hi, {user?.name}</p>
                        </div>
                        <div className="flex items-center gap-1.5">
                            {canUndo && (
                                <button
                                    onClick={handleUndo}
                                    className="p-2 bg-amber-50 rounded-lg text-amber-600 hover:bg-amber-100"
                                    title="Undo"
                                >
                                    <Undo2Icon size={18} />
                                </button>
                            )}
                            <button
                                onClick={handleQuickMetrocard}
                                className="px-2.5 py-2 bg-cyan-50 text-cyan-700 rounded-lg hover:bg-cyan-100 text-xs font-semibold flex items-center gap-1"
                                title="Quick add Metrocard $3"
                            >
                                🚇 MTA
                            </button>
                            <button
                                onClick={() => { setEditExpense(null); setShowAddModal(true); }}
                                className="p-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200"
                            >
                                <CameraIcon size={18} />
                            </button>
                            <button
                                onClick={() => { setEditExpense(null); setShowAddModal(true); }}
                                className="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                            >
                                <PlusCircleIcon size={18} />
                            </button>
                            <SettingsDropdown user={user} onLogout={logout} />
                        </div>
                    </div>

                    {/* Content */}
                    <div className="flex-1 overflow-y-auto">
                        {loading ? (
                            <div className="flex items-center justify-center h-full">
                                <div className="text-center">
                                    <div className="inline-block animate-spin mb-4">
                                        <RefreshCwIcon size={32} className="text-blue-600" />
                                    </div>
                                    <p className="text-gray-600">Loading expenses...</p>
                                </div>
                            </div>
                        ) : (
                            <>
                                {activeTab === 'home' && <HomeTab expenses={expenses} onEdit={handleEditExpense} />}

                                {activeTab === 'all' && (
                                    <AllTab
                                        expenses={expenses}
                                        onDelete={handleDeleteExpense}
                                        onUpdate={handleUpdateExpense}
                                        onEdit={handleEditExpense}
                                    />
                                )}

                                {activeTab === 'cards' && (
                                    <div className="pb-20 p-4 space-y-4">
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                            {CREDIT_CARDS.map(card => (
                                                <button
                                                    key={card.id}
                                                    onClick={() => setSelectedCard(card.id)}
                                                    className={`whitespace-nowrap px-4 py-2 rounded-full font-medium transition ${selectedCard === card.id ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-800'}`}
                                                >
                                                    {card.shortName}
                                                </button>
                                            ))}
                                        </div>
                                        <AccountTabView
                                            accountId={selectedCard}
                                            expenses={expenses}
                                            onUpdate={handleUpdateExpense}
                                            onReconcile={handleReconcile}
                                            onDelete={handleDeleteExpense}
                                            onEdit={handleEditExpense}
                                        />
                                    </div>
                                )}

                                {activeTab === 'banks' && (
                                    <div className="pb-20 p-4 space-y-4">
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                            {BANK_ACCOUNTS.map(bank => (
                                                <button
                                                    key={bank.id}
                                                    onClick={() => setSelectedBank(bank.id)}
                                                    className={`whitespace-nowrap px-4 py-2 rounded-full font-medium transition ${selectedBank === bank.id ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-800'}`}
                                                >
                                                    {bank.shortName}
                                                </button>
                                            ))}
                                        </div>
                                        <AccountTabView
                                            accountId={selectedBank}
                                            expenses={expenses}
                                            onUpdate={handleUpdateExpense}
                                            onReconcile={handleReconcile}
                                            onDelete={handleDeleteExpense}
                                            onEdit={handleEditExpense}
                                        />
                                    </div>
                                )}
                            </>
                        )}
                    </div>

                    {/* Add/Edit Expense Modal */}
                    <AddExpenseModal
                        isOpen={showAddModal}
                        onClose={handleCloseModal}
                        onAdd={handleAddExpense}
                        onUpdate={handleUpdateExpense}
                        editExpense={editExpense}
                        token={token}
                        userName={user?.name}
                    />

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-2 z-30">
                        {[
                            { id: 'home', icon: HomeIcon, label: 'Home' },
                            { id: 'all', icon: ListIcon, label: 'All' },
                            { id: 'cards', icon: CreditCardIcon, label: 'Cards' },
                            { id: 'banks', icon: WalletIcon, label: 'Banks' },
                        ].map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex flex-col items-center gap-1 p-2 rounded-lg transition ${activeTab === tab.id ? 'text-blue-600' : 'text-gray-500'}`}
                            >
                                <tab.icon size={24} />
                                <span className="text-xs font-medium">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Toast with Undo */}
                    {toast && (
                        <div className="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-4 py-2.5 rounded-lg z-40 flex items-center gap-3 shadow-lg">
                            <span className="text-sm">{toast}</span>
                            {canUndo && (
                                <button
                                    onClick={handleUndo}
                                    className="text-sm font-bold text-blue-300 hover:text-blue-100 uppercase tracking-wide"
                                >
                                    Undo
                                </button>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ============ RENDER ============
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

            if (typeof date === 'string') {
                return date;
            }
            return new Date(date).toLocaleDateString('en-US', {
                month: '2-digit',
                day: '2-digit',
                year: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
            });
        };

        const getCurrentTimestamp = () => {
            const now = new Date();
            return `${(now.getMonth() + 1)}/${now.getDate()}/${now.getFullYear()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        };

        // ============ GOOGLE OAUTH ============
        const useGoogleAuth = () => {
            // Restore saved session from localStorage
            const savedUser = (() => { try { return JSON.parse(localStorage.getItem('expense_user')); } catch { return null; } })();
            const savedToken = localStorage.getItem('expense_token');
            const savedExpiry = parseInt(localStorage.getItem('expense_token_expiry') || '0');
            const isExpired = !savedToken || !savedExpiry || Date.now() > savedExpiry;

            const [user, setUser] = useState(isExpired ? null : savedUser);
            const [token, setToken] = useState(isExpired ? null : savedToken);
            const tokenClientRef = useRef(null);
            const tokenExpiryRef = useRef(isExpired ? null : savedExpiry);

            const saveSession = useCallback((tkn, usr, expiry) => {
                try {
                    if (tkn && usr) {
                        localStorage.setItem('expense_token', tkn);
                        localStorage.setItem('expense_user', JSON.stringify(usr));
                        localStorage.setItem('expense_token_expiry', expiry.toString());
                    } else {
                        localStorage.removeItem('expense_token');
                        localStorage.removeItem('expense_user');
                        localStorage.removeItem('expense_token_expiry');
                    }
                } catch (e) { /* localStorage unavailable */ }
            }, []);

            const initTokenClient = useCallback(() => {
                if (!window.google) return;
                tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'openid email profile https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file',
                    callback: async (resp) => {
                        if (resp.access_token) {
                            const expiry = Date.now() + 50 * 60 * 1000;
                            setToken(resp.access_token);
                            tokenExpiryRef.current = expiry;
                            // Fetch user info
                            try {
                                const userResp = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                                    headers: { 'Authorization': `Bearer ${resp.access_token}` }
                                });
                                const userData = await userResp.json();
                                if (ALLOWED_EMAILS.includes(userData.email)) {
                                    const usr = {
                                        email: userData.email,
                                        name: EMAIL_TO_NAME[userData.email] || userData.name,
                                        picture: userData.picture
                                    };
                                    setUser(usr);
                                    saveSession(resp.access_token, usr, expiry);
                                } else {
                                    alert('Email not authorized');
                                    setToken(null);
                                    setUser(null);
                                    saveSession(null, null, 0);
                                }
                            } catch (err) {
                                console.error('Failed to fetch user info:', err);
                            }
                        }
                    }
                });
            }, [saveSession]);

            useEffect(() => {
                if (window.google) {
                    initTokenClient();
                    // If we have a saved token but it'll expire soon, silently refresh
                    if (token && tokenExpiryRef.current && Date.now() > tokenExpiryRef.current - 10 * 60 * 1000) {
                        // Token expiring soon, request silent refresh once client is ready
                        setTimeout(() => {
                            if (tokenClientRef.current) {
                                tokenClientRef.current.requestAccessToken({ prompt: '' });
                            }
                        }, 1000);
                    }
                }
            }, [initTokenClient]);

            const login = useCallback(() => {
                if (tokenClientRef.current) {
                    tokenClientRef.current.requestAccessToken();
                }
            }, []);

            const silentRefresh = useCallback(async () => {
                if (tokenClientRef.current && tokenExpiryRef.current && Date.now() > tokenExpiryRef.current - 5 * 60 * 1000) {
                    tokenClientRef.current.requestAccessToken({ prompt: '' });
                }
            }, []);

            useEffect(() => {
                if (!user || !token) return;
                const interval = setInterval(silentRefresh, 5 * 60 * 1000);
                return () => clearInterval(interval);
            }, [user, token, silentRefresh]);

            const logout = useCallback(() => {
                setUser(null);
                setToken(null);
                tokenExpiryRef.current = null;
                saveSession(null, null, 0);
            }, [saveSession]);

            return { user, token, login, logout };
        };

        // ============ GOOGLE SHEETS API ============
        const useGoogleSheets = (token) => {
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(false);

            // Sheet columns: A=Timestamp, B=Purchase Date, C=Card, D=Store/Transaction,
            // E=Charge/Debit, F=Deposit, G=Fee, H=Category, I=Receipt
            const fetchExpenses = useCallback(async (silent = false) => {
                if (!token) return;
                if (!silent) setLoading(true);
                try {
                    const resp = await fetch(
                        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_TAB)}!A:I`,
                        { headers: { 'Authorization': `Bearer ${token}` } }
                    );
                    const data = await resp.json();
                    const rows = data.values || [];
                    const parsed = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || !row[0]) continue;
                        const charge = parseFloat(String(row[4] || '').replace(/[,$]/g, '')) || 0;  // E: Charge/Debit
                        const deposit = parseFloat(String(row[5] || '').replace(/[,$]/g, '')) || 0;  // F: Deposit
                        const hasDeposit = deposit > 0;
                        const hasCharge = charge > 0;
                        const amount = hasDeposit && !hasCharge ? deposit : charge;
                        // Determine transaction type
                        const catRaw = (row[7] || '').toLowerCase();
                        let txnType = 'charge'; // default
                        if (hasDeposit && !hasCharge) {
                            // It's in the Deposit column — is it income or a refund?
                            if (catRaw.includes('refund') || catRaw.includes('credit') || catRaw.includes('return')) {
                                txnType = 'credit_refund';
                            } else {
                                txnType = 'deposit';
                            }
                        }
                        parsed.push({
                            rowIndex: i + 1,
                            timestamp: row[0] || '',                    // A: Timestamp
                            date: row[1] || '',                         // B: Purchase Date
                            merchant: row[3] || '',                     // D: Store/Transaction
                            amount: amount,
                            category: matchCategoryFromSheet(row[7]),    // H: Category
                            categoryRaw: row[7] || '',                  // Keep original for writing back
                            account: matchAccountFromSheet(row[2]),      // C: Card
                            accountRaw: row[2] || '',                   // Keep original for writing back
                            receipt: row[8] || '',                      // I: Receipt
                            fee: parseFloat(row[6]) || 0,              // G: Fee
                            txnType: txnType,
                            isCredit: txnType !== 'charge',  // backwards compat for display
                            originalCurrency: 'USD',
                            originalAmount: amount,
                            reconciled: (() => { try { return JSON.parse(localStorage.getItem('rec_' + (i + 1))) || false; } catch { return false; } })(),
                            reconciledLocked: false,
                            notes: '',
                            person: '',
                        });
                    }
                    // Sort newest first
                    parsed.sort((a, b) => {
                        const dateA = a.date || a.timestamp;
                        const dateB = b.date || b.timestamp;
                        return new Date(dateB) - new Date(dateA) || b.rowIndex - a.rowIndex;
                    });
                    setExpenses(parsed);
                } catch (err) {
                    console.error('Failed to fetch expenses:', err);
                } finally {
                    if (!silent) setLoading(false);
                }
            }, [token]);

            const appendExpense = useCallback(async (expense) => {
                if (!token) return;
                try {
                    // Sheet columns: A=Timestamp, B=Purchase Date, C=Card, D=Store/Transaction,
                    // E=Charge/Debit, F=Deposit, G=Fee, H=Category, I=Receipt
                    const isInflow = expense.txnType === 'deposit' || expense.txnType === 'credit_refund';
                    const chargeAmt = isInflow ? '' : expense.amount;
                    const depositAmt = isInflow ? expense.amount : '';
                    const row = [
                        getCurrentTimestamp(),                              // A: Timestamp
                        expense.date || new Date().toLocaleDateString('en-US'), // B: Purchase Date
                        getSheetCardName(expense.account),                  // C: Card
                        expense.merchant,                                   // D: Store/Transaction
                        chargeAmt,                                         // E: Charge/Debit
                        depositAmt,                                        // F: Deposit
                        '',                                                // G: Fee
                        getSheetCategoryName(expense.category),            // H: Category
                        expense.receipt || '',                             // I: Receipt
                    ];
                    await fetch(
                        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_TAB)}!A:I:append?valueInputOption=USER_ENTERED`,
                        {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ values: [row] })
                        }
                    );
                    await fetchExpenses();
                } catch (err) {
                    console.error('Failed to append expense:', err);
                }
            }, [token, fetchExpenses]);

            const updateExpense = useCallback(async (rowIndex, expense) => {
                if (!token) return;
                try {
                    // Sheet: A=Timestamp, B=Purchase Date, C=Card, D=Store, E=Charge, F=Deposit, G=Fee, H=Category, I=Receipt
                    const isInflow = expense.txnType === 'deposit' || expense.txnType === 'credit_refund';
                    const chargeAmt = isInflow ? '' : expense.amount;
                    const depositAmt = isInflow ? expense.amount : '';
                    const row = [
                        expense.timestamp,                                      // A
                        expense.date || '',                                     // B
                        expense.accountRaw || getSheetCardName(expense.account), // C
                        expense.merchant,                                       // D
                        chargeAmt,                                             // E
                        depositAmt,                                            // F
                        expense.fee || '',                                     // G
                        expense.categoryRaw || getSheetCategoryName(expense.category), // H
                        expense.receipt || '',                                 // I
                    ];
                    await fetch(
                        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_TAB)}!A${rowIndex}:I${rowIndex}?valueInputOption=USER_ENTERED`,
                        {
                            method: 'PUT',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ values: [row] })
                        }
                    );
                    await fetchExpenses(true);
                } catch (err) {
                    console.error('Failed to update expense:', err);
                }
            }, [token, fetchExpenses]);

            const deleteExpense = useCallback(async (rowIndex) => {
                if (!token) return;
                try {
                    await fetch(
                        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_TAB)}!A${rowIndex}:I${rowIndex}?valueInputOption=USER_ENTERED`,
                        {
                            method: 'PUT',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ values: [[]] })
                        }
                    );
                    await fetchExpenses(true);
                } catch (err) {
                    console.error('Failed to delete expense:', err);
                }
            }, [token, fetchExpenses]);

            return {
                expenses,
                loading,
                fetchExpenses,
                appendExpense,
                updateExpense,
                deleteExpense
            };
        };

        // ============ GOOGLE DRIVE API ============
        const useGoogleDrive = (token) => {
            const uploadReceipt = useCallback(async (file, merchant, person) => {
                if (!token) return null;
                try {
                    const now = new Date();
                    const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
                    const filename = `${dateStr} - ${merchant} (${person})`;

                    const metadata = {
                        name: filename,
                        mimeType: file.type,
                        parents: [DRIVE_FOLDER_ID]
                    };

                    const formData = new FormData();
                    formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                    formData.append('file', file);

                    const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    const result = await resp.json();
                    if (result.webViewLink) {
                        // Share with view access
                        await fetch(`https://www.googleapis.com/drive/v3/files/${result.id}/permissions`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ role: 'reader', type: 'anyone' })
                        });
                        return result.webViewLink;
                    }
                } catch (err) {
                    console.error('Failed to upload receipt:', err);
                }
                return null;
            }, [token]);

            return { uploadReceipt };
        };

        // ============ TESSERACT OCR ============
        const useOCR = () => {
            const [processing, setProcessing] = useState(false);

            const scanReceipt = useCallback(async (imageFile) => {
                setProcessing(true);
                try {
                    const imageData = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(imageFile);
                    });

                    const { createWorker } = Tesseract;
                    const worker = await createWorker();
                    const { data: { text } } = await worker.recognize(imageData);
                    await worker.terminate();

                    // Parse OCR text
                    const lines = text.split('\n').filter(l => l.trim());
                    let merchant = lines[0] || 'Unknown';
                    let amount = 0;
                    let date = new Date().toISOString().split('T')[0];

                    // Look for total/amount
                    const amountRegex = /(?:total|amount|due|balance)[\s:]*\$?(\d+\.?\d*)/i;
                    const amountMatch = text.match(amountRegex);
                    if (amountMatch) amount = parseFloat(amountMatch[1]);

                    // Look for date
                    const dateRegex = /(\d{1,2})\/(\d{1,2})\/(\d{2,4})/;
                    const dateMatch = text.match(dateRegex);
                    if (dateMatch) {
                        const [, m, d, y] = dateMatch;
                        const fullYear = y.length === 2 ? parseInt('20' + y) : parseInt(y);
                        date = `${fullYear}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    }

                    return {
                        merchant,
                        amount,
                        date,
                        category: suggestCategory(merchant),
                        fullText: text
                    };
                } catch (err) {
                    console.error('OCR failed:', err);
                    return null;
                } finally {
                    setProcessing(false);
                }
            }, []);

            return { scanReceipt, processing };
        };

        // ============ UNDO SYSTEM ============
        const useUndoStack = () => {
            const [stack, setStack] = useState([]);
            const [currentState, setCurrentState] = useState(null);

            const push = useCallback((state) => {
                setStack(prev => [...prev.slice(-19), state]);
            }, []);

            const undo = useCallback(() => {
                if (stack.length === 0) return null;
                const newStack = stack.slice(0, -1);
                setStack(newStack);
                return newStack[newStack.length - 1] || null;
            }, [stack]);

            return { stack, push, undo, canUndo: stack.length > 0 };
        };

        // ============ MAIN COMPONENTS ============

        const ExpenseRow = ({ expense, onDelete, onUpdate, onReconcile, showReconcile, isLocked, onEdit, hideAccount = false, showDateSeparator = false }) => {
            const category = getCategoryById(expense.category);
            const account = getAccountById(expense.account);
            const isPaymentOrTransfer = expense.category === 'card_payment' || expense.category === 'transfer';
            const isInflow = !isPaymentOrTransfer && (expense.txnType === 'deposit' || expense.txnType === 'credit_refund');

            return (
                <>
                {showDateSeparator && (
                    <div className="bg-gray-50 px-3 py-1.5 border-b-2 border-gray-200">
                        <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{expense.date || expense.timestamp}</span>
                    </div>
                )}
                <div className="flex items-center gap-2.5 py-2.5 px-3 border-b border-gray-100 hover:bg-gray-50 group cursor-pointer" onClick={() => onEdit && onEdit(expense)}>
                    <div className="text-xl flex-shrink-0">{category?.emoji || '📦'}</div>
                    <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-1.5">
                            <span className="font-medium text-sm truncate">{expense.merchant}</span>
                            {isPaymentOrTransfer && (
                                <span className="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded flex-shrink-0 leading-none">{expense.category === 'card_payment' ? 'Payment' : 'Transfer'}</span>
                            )}
                            {!isPaymentOrTransfer && expense.txnType === 'deposit' && (
                                <span className="text-[10px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded flex-shrink-0 leading-none">Income</span>
                            )}
                            {!isPaymentOrTransfer && expense.txnType === 'credit_refund' && (
                                <span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded flex-shrink-0 leading-none">Refund</span>
                            )}
                        </div>
                        <div className="text-[11px] text-gray-400 flex items-center gap-1.5 mt-0.5">
                            <span>{expense.date || expense.timestamp}</span>
                            {!hideAccount && account && <span className="font-medium" style={{ color: account.color }}>{account.shortName}</span>}
                        </div>
                    </div>
                    <div className="text-right flex-shrink-0">
                        <span className={`font-semibold text-sm ${isPaymentOrTransfer ? 'text-gray-500' : isInflow ? 'text-green-600' : 'text-red-600'}`}>
                            {isPaymentOrTransfer ? '' : isInflow ? '+' : '-'}${fmt(expense.amount)}
                        </span>
                    </div>
                    {(() => {
                        const dateISO = parseDateToISO(expense.date);
                        const isPre2026 = dateISO < '2026-01-01';
                        if (isPre2026 && showReconcile) {
                            return <div className="ml-1 flex-shrink-0"><CircleIcon size={18} className="text-gray-200" /></div>;
                        }
                        return (
                            <>
                                {showReconcile && !isLocked && (
                                    <button
                                        onClick={(e) => { e.stopPropagation(); onReconcile(expense.rowIndex, !expense.reconciled); }}
                                        className="ml-1 flex-shrink-0"
                                    >
                                        {expense.reconciled ? (
                                            <CheckCircleIcon size={18} className="text-green-600" />
                                        ) : (
                                            <CircleIcon size={18} className="text-gray-300" />
                                        )}
                                    </button>
                                )}
                                {showReconcile && isLocked && expense.reconciled && (
                                    <div className="ml-1 flex-shrink-0">
                                        <CheckCircleIcon size={18} className="text-amber-600" />
                                    </div>
                                )}
                            </>
                        );
                    })()}
                    {onEdit && (
                        <button
                            onClick={(e) => { e.stopPropagation(); onEdit(expense); }}
                            className="p-1 hover:scale-110 transition-transform"
                            title="Edit"
                        >
                            <span style={{ fontSize: '14px', display: 'inline-block', transform: 'scaleX(-1)' }}>✏️</span>
                        </button>
                    )}
                    <button
                        onClick={(e) => { e.stopPropagation(); if (confirm('Delete this expense?')) onDelete(expense.rowIndex); }}
                        className="ml-1 flex-shrink-0"
                    >
                        <Trash2Icon size={16} className="text-red-400 hover:text-red-600" />
                    </button>
                </div>
                </>
            );
        };

        // Helper: parse various date formats to YYYY-MM-DD for input[type=date]
        const parseDateToISO = (dateStr) => {
            if (!dateStr) return new Date().toISOString().split('T')[0];
            // Already YYYY-MM-DD?
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            // Try MM/DD/YYYY or M/D/YYYY
            const mdyMatch = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
            if (mdyMatch) {
                const [, m, d, y] = mdyMatch;
                const fullYear = y.length === 2 ? '20' + y : y;
                return `${fullYear}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
            }
            // Try Date.parse as fallback
            const parsed = new Date(dateStr);
            if (!isNaN(parsed)) return parsed.toISOString().split('T')[0];
            return new Date().toISOString().split('T')[0];
        };

        // Helper: get date key for grouping
        const getDateKey = (expense) => {
            return parseDateToISO(expense.date || expense.timestamp);
        };

        const AddExpenseModal = ({ isOpen, onClose, onAdd, onUpdate, editExpense, token, userName }) => {
            const isEdit = !!editExpense;
            const [merchant, setMerchant] = useState('');
            const [amount, setAmount] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [category, setCategory] = useState('other');
            const [account, setAccount] = useState('');
            const [notes, setNotes] = useState('');
            const [receipt, setReceipt] = useState('');
            const [txnType, setTxnType] = useState('charge');
            const [originalCurrency, setOriginalCurrency] = useState('USD');
            const [originalAmount, setOriginalAmount] = useState('');

            // Pre-fill when editing
            useEffect(() => {
                if (editExpense && isOpen) {
                    setMerchant(editExpense.merchant || '');
                    setAmount(editExpense.amount?.toString() || '');
                    setDate(parseDateToISO(editExpense.date));
                    setCategory(editExpense.category || 'other');
                    setAccount(editExpense.account || '');
                    setNotes(editExpense.notes || '');
                    setReceipt(editExpense.receipt || '');
                    setTxnType(editExpense.txnType || 'charge');
                    setOriginalCurrency(editExpense.originalCurrency || 'USD');
                    setOriginalAmount(editExpense.originalAmount?.toString() || '');
                } else if (!editExpense && isOpen) {
                    setMerchant('');
                    setAmount('');
                    setDate(new Date().toISOString().split('T')[0]);
                    setCategory('other');
                    setAccount('');
                    setNotes('');
                    setReceipt('');
                    setTxnType('charge');
                    setOriginalCurrency('USD');
                    setOriginalAmount('');
                }
            }, [editExpense, isOpen]);
            const [showScanner, setShowScanner] = useState(false);
            const [showOCRSpinner, setShowOCRSpinner] = useState(false);

            const { scanReceipt, processing } = useOCR();
            const { uploadReceipt } = useGoogleDrive(token);

            const handleScan = async (file) => {
                setShowOCRSpinner(true);
                const result = await scanReceipt(file);
                setShowOCRSpinner(false);
                if (result) {
                    setMerchant(result.merchant);
                    setAmount(result.amount.toString());
                    setDate(result.date);
                    setCategory(result.category);
                }
            };

            const handleReceiptUpload = async (file) => {
                if (token && merchant) {
                    const url = await uploadReceipt(file, merchant, userName);
                    if (url) setReceipt(url);
                }
            };

            const handleAdd = () => {
                if (!merchant || !amount || !account) {
                    alert('Please fill in merchant, amount, and account');
                    return;
                }
                const data = {
                    merchant,
                    amount: parseFloat(amount),
                    category,
                    account,
                    notes,
                    receipt,
                    txnType,
                    isCredit: txnType !== 'charge',
                    originalCurrency,
                    originalAmount: originalAmount ? parseFloat(originalAmount) : parseFloat(amount),
                    person: userName,
                    date,
                };
                if (isEdit && editExpense) {
                    onUpdate(editExpense.rowIndex, { ...editExpense, ...data });
                } else {
                    onAdd(data);
                }
                onClose();
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-40 flex items-end">
                    <div className="bg-white w-full rounded-t-2xl p-6 max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold">{isEdit ? 'Edit Expense' : 'Add Expense'}</h2>
                            <button onClick={onClose} className="p-1 hover:bg-gray-200 rounded">
                                <XIcon size={24} />
                            </button>

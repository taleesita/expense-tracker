        };

        const ReceiptScanner = ({ onCapture, onFile, onClose }) => {
            const [dragActive, setDragActive] = useState(false);
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(e.type !== 'dragleave');
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files?.[0]) {
                    onFile(e.dataTransfer.files[0]);
                    onClose();
                }
            };

            return (
                <div className="bg-gray-100 rounded-lg p-4 mb-4">
                    <div
                        onDragEnter={handleDrag}
                        onDragLeave={handleDrag}
                        onDragOver={handleDrag}
                        onDrop={handleDrop}
                        className={`border-2 border-dashed rounded-lg p-6 text-center transition ${dragActive ? 'border-blue-600 bg-blue-50' : 'border-gray-400'}`}
                    >
                        <p className="text-gray-600 mb-2">{isMobile ? 'Take a photo or choose a file' : 'Drag and drop a receipt image here'}</p>
                        <div className="flex gap-2 justify-center">
                            {/* On mobile, use native camera via file input with capture attribute */}
                            <input
                                type="file"
                                accept="image/*"
                                capture="environment"
                                onChange={(e) => { if (e.target.files?.[0]) { onCapture(e.target.files[0]); onClose(); } }}
                                className="hidden"
                                id="scanner-camera"
                            />
                            <label htmlFor="scanner-camera" className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 cursor-pointer">
                                <CameraIcon size={18} /> Take Photo
                            </label>
                            <input
                                type="file"
                                accept="image/*,application/pdf"
                                onChange={(e) => { if (e.target.files?.[0]) { onFile(e.target.files[0]); onClose(); } }}
                                className="hidden"
                                id="scanner-file"
                            />
                            <label htmlFor="scanner-file" className="flex items-center gap-2 bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 cursor-pointer">
                                <Upload2Icon size={18} /> Upload
                            </label>
                        </div>
                    </div>
                </div>
            );
        };

        const AccountTabView = ({ accountId, expenses, onUpdate, onReconcile, onDelete, onEdit, onLockItems, onClearUnlocked }) => {
            const account = getAccountById(accountId);
            const accountExpenses = expenses.filter(e => e.account === accountId);
            const displayExpenses = accountExpenses.filter(e => !e._balanceOnly); // exclude balance-only rows from UI
            const [searchTerm, setSearchTerm] = useState('');

            // Only count 2026+ expenses for reconciliation progress
            const isRecent = (e) => {
                const d = parseDateToISO(e.date);
                return d >= '2026-01-01';
            };
            const recentExpenses = displayExpenses.filter(isRecent);
            const lockedExpenses = recentExpenses.filter(e => e.reconciledLocked);
            const unlockedReconciled = recentExpenses.filter(e => e.reconciled && !e.reconciledLocked);
            const unlockedUnreconciled = recentExpenses.filter(e => !e.reconciled && !e.reconciledLocked);
            const totalReconciled = lockedExpenses.length + unlockedReconciled.length;

            const filteredExpenses = displayExpenses.filter(e =>
                e.merchant.toLowerCase().includes(searchTerm.toLowerCase())
            );
            const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);
            // Reset visible count when search or account changes
            const prevAcctSearch = React.useRef(searchTerm + accountId);
            React.useEffect(() => {
                const key = searchTerm + accountId;
                if (prevAcctSearch.current !== key) {
                    setVisibleCount(PAGE_SIZE);
                    prevAcctSearch.current = key;
                }
            }, [searchTerm, accountId]);
            const visibleExpenses = filteredExpenses.slice(0, visibleCount);
            const hasMore = filteredExpenses.length > visibleCount;

            const isCreditCard = CREDIT_CARDS.some(c => c.id === accountId);
            const total = calcAccountBalance(accountExpenses, accountId);
            const progress = recentExpenses.length > 0 ? (totalReconciled / recentExpenses.length) * 100 : 0;

            const handleLock = () => {
                if (unlockedReconciled.length === 0) return;
                if (confirm(`Lock ${unlockedReconciled.length} reconciled item${unlockedReconciled.length === 1 ? '' : 's'}? They won't be clearable after this.`)) {
                    onLockItems(unlockedReconciled.map(e => e.rowIndex));
                }
            };

            const handleClear = () => {
                if (unlockedReconciled.length === 0) return;
                if (confirm(`Clear ${unlockedReconciled.length} unlocked reconciliation${unlockedReconciled.length === 1 ? '' : 's'}?`)) {
                    onClearUnlocked(unlockedReconciled.map(e => e.rowIndex));
                }
            };

            if (!account) return null;

            return (
                <div className="space-y-4">
                    <div className="bg-white p-4 rounded-lg border border-gray-200">
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-bold text-lg">{account.name}</h3>
                        </div>
                        <div className={`text-2xl font-bold mb-3 ${isCreditCard ? (total < 0 ? 'text-red-600' : 'text-green-600') : (total >= 0 ? 'text-green-600' : 'text-red-600')}`}>${fmt(total)}</div>
                        <div className="w-full bg-gray-200 rounded-full h-2 mb-2">
                            <div
                                className="h-2 rounded-full transition-all"
                                style={{
                                    width: `${progress}%`,
                                    background: lockedExpenses.length > 0 && unlockedReconciled.length > 0
                                        ? `linear-gradient(to right, #D97706 ${(lockedExpenses.length / recentExpenses.length) * 100}%, ${account.color || '#3B82F6'} ${(lockedExpenses.length / recentExpenses.length) * 100}%)`
                                        : lockedExpenses.length > 0 ? '#D97706' : (account.color || '#3B82F6')
                                }}
                            />
                        </div>
                        <div className="text-sm text-gray-600 mb-1">
                            {totalReconciled} of {recentExpenses.length} reconciled (2026)
                        </div>
                        {(lockedExpenses.length > 0 || unlockedReconciled.length > 0) && (
                            <div className="text-xs text-gray-400 mb-3">
                                {lockedExpenses.length > 0 && <span className="text-amber-600">{lockedExpenses.length} locked</span>}
                                {lockedExpenses.length > 0 && unlockedReconciled.length > 0 && <span> · </span>}
                                {unlockedReconciled.length > 0 && <span className="text-green-600">{unlockedReconciled.length} unlocked</span>}
                            </div>
                        )}
                        {unlockedReconciled.length > 0 && (
                            <div className="flex gap-2">
                                <button
                                    onClick={handleLock}
                                    className="flex-1 bg-amber-100 text-amber-700 py-2 rounded-lg font-medium hover:bg-amber-200 text-sm flex items-center justify-center gap-1.5"
                                >
                                    <LockIcon size={14} /> Lock {unlockedReconciled.length}
                                </button>
                                <button
                                    onClick={handleClear}
                                    className="flex-1 bg-red-100 text-red-700 py-2 rounded-lg font-medium hover:bg-red-200 text-sm"
                                >
                                    Clear {unlockedReconciled.length}
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="flex gap-2 bg-white p-3 rounded-lg">
                        <SearchIcon size={20} className="text-gray-400" />
                        <input
                            type="text"
                            placeholder="Search..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="flex-1 outline-none"
                        />
                    </div>

                    <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                        {filteredExpenses.length === 0 ? (
                            <div className="p-4 text-center text-gray-500">No expenses</div>
                        ) : (
                            <>
                                {visibleExpenses.map((expense, idx) => (
                                    <ExpenseRow
                                        key={expense.rowIndex}
                                        expense={expense}
                                        onDelete={onDelete}
                                        onUpdate={(updated) => onUpdate(updated.rowIndex, updated)}
                                        onReconcile={onReconcile}
                                        onEdit={onEdit}
                                        showReconcile={true}
                                        hideAccount={true}
                                        showDateSeparator={idx === 0 || getDateKey(expense) !== getDateKey(visibleExpenses[idx - 1])}
                                    />
                                ))}
                                {hasMore && (
                                    <button
                                        onClick={() => setVisibleCount(c => c + PAGE_SIZE)}
                                        className="w-full py-3 text-sm text-blue-600 font-medium bg-blue-50 hover:bg-blue-100 border-t border-gray-200"
                                    >
                                        Show more ({filteredExpenses.length - visibleCount} remaining)
                                    </button>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // ============ QUARTERLY REVIEW ============
        const parseDollar = (v) => {
            if (typeof v === 'number') return v;
            if (!v) return 0;
            const s = String(v).replace(/[$,\s]/g, '');
            const neg = s.includes('(') || (s.includes('-') && !s.startsWith('-'));
            const num = parseFloat(s.replace(/[()]/g, '')) || 0;
            return neg ? -num : (s.startsWith('-') ? -num : num);
        };
        const fmtQ = (n) => {
            const abs = Math.abs(n);
            return abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        const QuarterlyReview = ({ token, expenses }) => {
            const [loading, setLoading] = useState(false);
            const [qrData, setQrData] = useState(null);
            const [currentValues, setCurrentValues] = useState({});
            const [showPct, setShowPct] = useState(false);
            const [lockedQuarters, setLockedQuarters] = useState(() => {
                try { return JSON.parse(localStorage.getItem('qr_locked') || '[]'); } catch { return []; }
            });
            const [expandedDormant, setExpandedDormant] = useState({}); // per-category: { liquid: true }
            const [selectedQ, setSelectedQ] = useState(null); // clicked quarter label from chart
            const [showHistoryDormant, setShowHistoryDormant] = useState(false); // show inactive in history table

            // Fetch quarterly data from sheet
            const fetchQRData = useCallback(async () => {
                if (!token) return;
                setLoading(true);
                try {
                    const resp = await fetch(
                        `https://sheets.googleapis.com/v4/spreadsheets/${QR_SHEET_ID}/values/${encodeURIComponent(QR_SHEET_TAB)}?valueRenderOption=FORMATTED_VALUE`,
                        { headers: { 'Authorization': `Bearer ${token}` } }
                    );
                    const data = await resp.json();
                    const rows = data.values || [];
                    if (rows.length < 3) { setLoading(false); return; }

                    // Row 1 (index 0) is empty; row 2 (index 1) has headers
                    const header = rows[1] || [];
                    const quarters = [];

                    // Scan header for quarter labels (YYYY.MM pattern) at any column
                    for (let c = 0; c < header.length; c++) {
                        const label = (header[c] || '').trim();
                        if (/^\d{4}\.\d{2}$/.test(label)) {
                            quarters.push({
                                colIdx: c,
                                label: label,
                                isLabeled: true,
                            });
                        }
                    }

                    // Also find the "Variable" column (current working entry)
                    const varIdx = header.findIndex(h => /variable/i.test(h || ''));
                    if (varIdx >= 0) {
                        quarters.unshift({
                            colIdx: varIdx,
                            label: 'Current',
                            isLabeled: false,
                        });
                    }

                    // Parse account rows starting from row 3 (index 2)
                    const accounts = [];
                    const summaries = {};
                    for (let r = 2; r < rows.length; r++) {
                        const row = rows[r];
                        const name = (row[1] || '').trim();
                        const liquidity = (row[2] || '').trim();
                        if (!name) continue;
                        if (QR_SUMMARY_ROWS.includes(name)) {
                            // Parse summary values per quarter
                            summaries[name] = {};
                            quarters.forEach(q => {
                                const val = row[q.colIdx];
                                summaries[name][q.label] = typeof val === 'number' ? val : parseFloat(String(val || '').replace(/[$,()]/g, '')) || 0;
                                if (String(val || '').includes('(')) summaries[name][q.label] *= -1;
                            });
                            continue;
                        }
                        if (name === QR_FIDELITY_LABEL) break; // Stop before Fidelity section

                        // Determine category by name patterns, then fall back to sheet liquidity
                        let category = 'other';
                        const nm = name.toLowerCase();
                        const liq = liquidity.toLowerCase();

                        if (nm.includes('student loan cushion')) {
                            category = 'liquid'; // First Republic Student Loan Cushion was a bank account
                        } else if (nm.includes('student loan') || nm.includes('mortgage')) {
                            category = 'debt';
                        } else if (nm.includes('401k') || nm.includes('accrue')) {
                            category = '401k';
                        } else if (nm.includes('roth') || nm.includes('ira')) {
                            category = 'ira';
                        } else if (nm.includes('life insurance') || nm.includes('home equity') || nm.includes('escrow')) {
                            category = 'property';
                        } else if (nm.includes('investment account')) {
                            category = 'stock';
                        } else if (nm.includes('mercury')) {
                            category = 'business';
                        } else if (liq === 'liquid') {
                            category = 'liquid';
                        } else if (liq === 'stock') {
                            category = 'stock';
                        } else if (liq === 'illiquid') {
                            category = 'other'; // anything else illiquid goes to other
                        }

                        // Parse values for each quarter
                        const values = {};
                        quarters.forEach(q => {
                            values[q.label] = parseDollar(row[q.colIdx]);
                            const pctRaw = row[q.colIdx + 1];
                            if (pctRaw) {
                                const pctStr = String(pctRaw).replace('%', '');
                                values[q.label + '_pct'] = parseFloat(pctStr) / 100 || 0;
                            }
                        });

                        const trackerAcctId = QR_ACCOUNT_MAP[name] || null;
                        accounts.push({
                            name,
                            liquidity,
                            category,
                            values,
                            trackerAcctId,
                            sheetRow: r + 1, // 1-indexed
                        });
                    }

                    setQrData({ accounts, quarters, summaries });

                    // Pre-fill current values: auto-fill from tracker where possible
                    const prefill = {};
                    accounts.forEach(acct => {
                        if (acct.trackerAcctId && expenses.length > 0) {
                            const acctExpenses = expenses.filter(e => e.account === acct.trackerAcctId);
                            const bal = calcAccountBalance(acctExpenses, acct.trackerAcctId);
                            prefill[acct.name] = bal;
                        }
                        // Home equity auto-compute if mortgage value exists
                        if (acct.name === 'Home Equity' && prefill['Mortgage']) {
                            prefill['Home Equity'] = HOME_VALUE - Math.abs(prefill['Mortgage'] || 0);
                        }
                    });
                    setCurrentValues(prefill);
                } catch (err) {
                    console.error('Failed to fetch quarterly data:', err);
                } finally {
                    setLoading(false);
                }
            }, [token, expenses]);

            useEffect(() => { fetchQRData(); }, [fetchQRData]);

            if (loading) return (
                <div className="flex justify-center items-center py-20">
                    <div className="inline-block animate-spin text-2xl">⏳</div>
                </div>
            );
            if (!qrData) return (
                <div className="p-4 text-center text-gray-500">No quarterly data found</div>
            );

            const { accounts, quarters, summaries } = qrData;
            const prevQuarter = quarters.find(q => q.isLabeled) || quarters[1];
            const prevLabel = prevQuarter?.label || '';

            // Group accounts by category
            const grouped = {};
            QR_CATEGORIES.forEach(cat => { grouped[cat.id] = []; });
            accounts.forEach(acct => {
                const g = grouped[acct.category] || grouped['other'];
                g.push(acct);
            });

            // Determine dormant accounts (last 2 quarters = $0 or missing)
            const isDormant = (acct) => {
                const recent = quarters.filter(q => q.isLabeled).slice(0, 2);
                return recent.every(q => !acct.values[q.label] || acct.values[q.label] === 0);
            };

            // Get current value for an account (edited or auto-filled or last quarter)
            const getCurrentVal = (acct) => {
                if (currentValues[acct.name] !== undefined) return currentValues[acct.name];
                return null;
            };

            const setVal = (name, val) => {
                setCurrentValues(prev => {
                    const next = { ...prev, [name]: val };
                    // Auto-compute home equity when mortgage changes
                    if (name.toLowerCase().includes('mortgage') || name === 'Student Loan Balance') {
                        // Don't auto-compute for student loan
                    }
                    const mortgage = accounts.find(a => a.name.toLowerCase().includes('mortgage'));
                    if (mortgage && name === mortgage.name) {
                        next['Home Equity'] = HOME_VALUE - Math.abs(val || 0);
                    }
                    return next;
                });
            };

            // Calculate totals for current entry
            const currentTotal = accounts.reduce((sum, acct) => {
                const v = getCurrentVal(acct);
                if (v === null) return sum + (acct.values[prevLabel] || 0);
                // Student loan / mortgage are negative
                if (acct.category === 'debt') return sum - Math.abs(v);
                return sum + v;
            }, 0);

            const prevTotal = summaries['TOTAL']?.[prevLabel] || 0;
            const totalDelta = currentTotal - prevTotal;

            // For % calculations: sum of absolute values of all accounts
            const currentTotalAbs = accounts.reduce((sum, acct) => {
                const v = getCurrentVal(acct);
                return sum + Math.abs(v !== null ? v : (acct.values[prevLabel] || 0));
            }, 0);
            const prevTotalAbs = accounts.reduce((sum, acct) => sum + Math.abs(acct.values[prevLabel] || 0), 0);

            // Current quarter label
            const now = new Date();
            const currentQLabel = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}`;
            const isLocked = lockedQuarters.includes(currentQLabel);

            const handleLockQuarter = () => {
                if (confirm(`Lock ${currentQLabel}? Values will be saved to the sheet.`)) {
                    const updated = [...lockedQuarters, currentQLabel];
                    setLockedQuarters(updated);
                    try { localStorage.setItem('qr_locked', JSON.stringify(updated)); } catch {}
                    // TODO: Write back to sheet (Phase 3)
                    alert('Quarter locked! (Sheet write-back coming soon)');
                }
            };

            const renderAccountRow = (acct, isDormantRow) => {
                const prevVal = acct.values[prevLabel] || 0;
                const curVal = getCurrentVal(acct);
                const displayVal = curVal !== null ? curVal : '';
                const delta = curVal !== null ? curVal - prevVal : null;
                const isAutoFilled = acct.trackerAcctId && curVal !== null && !currentValues.hasOwnProperty(acct.name + '_manual');
                const isHomeEquity = acct.name === 'Home Equity';
                const isMortgage = acct.name.toLowerCase().includes('mortgage');

                // Home Equity: input is remaining mortgage, formula computes equity
                if (isHomeEquity) {
                    const mortgageRemaining = currentValues['_mortgage_remaining'] ?? '';
                    const mortgageNum = parseFloat(mortgageRemaining) || 0;
                    const equity = mortgageNum > 0 ? HOME_VALUE - mortgageNum : (curVal !== null ? curVal : 0);
                    const prevEquity = prevVal;
                    const eqDelta = equity - prevEquity;

                    return (
                        <div key={acct.name} className={`flex items-center gap-2 py-2.5 px-3 border-b border-gray-50 ${isDormantRow ? 'opacity-50' : ''}`}>
                            <div className="flex-1 min-w-0">
                                <div className="text-sm font-medium">{acct.name}</div>
                                <div className="text-[11px] text-gray-400 flex items-center gap-1 mt-0.5">
                                    <span>${fmt(HOME_VALUE)}</span>
                                    <span>−</span>
                                    <input
                                        type="number"
                                        step="0.01"
                                        placeholder="remaining mortgage"
                                        value={mortgageRemaining}
                                        onChange={(e) => {
                                            const v = e.target.value;
                                            setCurrentValues(prev => {
                                                const next = { ...prev, '_mortgage_remaining': v };
                                                const m = parseFloat(v) || 0;
                                                if (m > 0) next['Home Equity'] = HOME_VALUE - m;
                                                return next;
                                            });
                                        }}
                                        className="w-28 text-right text-xs border border-gray-200 rounded px-1.5 py-0.5"
                                    />
                                </div>
                            </div>
                            <span className="text-sm font-bold text-green-700 w-28 text-right flex-shrink-0">${fmt(equity)}</span>
                            <div className="text-xs text-gray-400 w-20 text-right flex-shrink-0">${fmt(Math.abs(prevEquity))}</div>
                            <span className={`text-xs font-semibold w-20 text-right flex-shrink-0 ${eqDelta > 0 ? 'text-green-600' : eqDelta < 0 ? 'text-red-600' : 'text-gray-400'}`}>
                                {eqDelta > 0 ? '+' : eqDelta < 0 ? '-' : ''}{eqDelta !== 0 ? `$${fmt(Math.abs(eqDelta))}` : '—'}
                            </span>
                        </div>
                    );
                }

                const curPct = currentTotalAbs > 0 ? (Math.abs(curVal ?? prevVal) / currentTotalAbs * 100) : 0;
                const prevPct = prevTotalAbs > 0 ? (Math.abs(prevVal) / prevTotalAbs * 100) : 0;

                return (
                    <div key={acct.name} className={`flex items-center gap-2 py-2.5 px-3 border-b border-gray-50 ${isDormantRow ? 'opacity-50' : ''}`}>
                        {/* Account name - fills remaining space */}
                        <div className="flex-1 min-w-0">
                            <div className="text-sm font-medium truncate">{acct.name}</div>
                            {isMortgage && <div className="text-[10px] text-gray-400">Enter remaining balance</div>}
                        </div>
                        {/* Entry field - fixed width, right-aligned */}
                        {isLocked ? (
                            <span className="text-sm font-semibold w-28 text-right">${fmt(Math.abs(curVal || prevVal))}</span>
                        ) : (
                            <input
                                type="number"
                                step="0.01"
                                placeholder="0.00"
                                value={displayVal !== '' ? parseFloat(Math.abs(displayVal).toFixed(2)) : ''}
                                onChange={(e) => {
                                    const v = parseFloat(e.target.value) || 0;
                                    setVal(acct.name, acct.category === 'debt' ? -v : v);
                                }}
                                className={`w-28 text-right text-sm border rounded-lg px-2 py-1.5 flex-shrink-0 ${isAutoFilled ? 'bg-blue-50 border-blue-200' : 'border-gray-200'}`}
                            />
                        )}
                        {showPct && <span className="text-[10px] text-gray-400 w-12 text-right flex-shrink-0">{curPct.toFixed(1)}%</span>}
                        {/* Last Q value - fixed width */}
                        <div className="text-xs text-gray-400 w-20 text-right flex-shrink-0">
                            ${fmt(Math.abs(prevVal))}
                        </div>
                        {showPct && <span className="text-[10px] text-gray-400 w-12 text-right flex-shrink-0">{prevPct.toFixed(1)}%</span>}
                        {/* Diff - fixed width */}
                        {delta !== null ? (
                            <span className={`text-xs font-semibold w-20 text-right flex-shrink-0 ${delta > 0 ? 'text-green-600' : delta < 0 ? 'text-red-600' : 'text-gray-400'}`}>
                                {delta > 0 ? '+' : delta < 0 ? '-' : ''}{delta !== 0 ? `$${fmt(Math.abs(delta))}` : '—'}
                            </span>
                        ) : (
                            <span className="text-xs text-gray-300 w-20 text-right flex-shrink-0">—</span>
                        )}
                    </div>
                );
            };

            return (
                <div className="space-y-4 pb-24">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-4 rounded-lg">
                        <div className="flex justify-between items-start mb-1">
                            <div>
                                <p className="text-xs opacity-80 uppercase tracking-wide">Net Worth</p>
                                <p className="text-2xl font-bold">${fmt(Math.abs(currentTotal))}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-xs opacity-80">vs {prevLabel || 'last'}</p>
                                <p className={`text-lg font-bold ${totalDelta >= 0 ? 'text-green-300' : 'text-red-300'}`}>
                                    {totalDelta >= 0 ? '+' : '-'}${fmt(Math.abs(totalDelta))}
                                </p>
                            </div>
                        </div>
                        {isLocked && (
                            <div className="mt-2 bg-white/20 rounded px-2 py-1 text-xs inline-block">
                                🔒 {currentQLabel} Locked
                            </div>
                        )}
                    </div>

                    {/* Controls */}
                    <div className="flex items-center gap-2 justify-end">
                        <label className="flex items-center gap-1.5 cursor-pointer select-none">
                            <span className="text-xs text-gray-500">% of Portfolio</span>
                            <div
                                onClick={() => setShowPct(!showPct)}
                                className={`relative w-9 h-5 rounded-full transition-colors ${showPct ? 'bg-indigo-500' : 'bg-gray-300'}`}
                                style={{ cursor: 'pointer' }}
                            >
                                <div className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${showPct ? 'translate-x-4' : 'translate-x-0.5'}`} />
                            </div>
                        </label>
                        {!isLocked && (
                            <button
                                onClick={handleLockQuarter}
                                className="px-3 py-1.5 rounded-lg text-xs font-medium bg-amber-100 text-amber-700"
                            >
                                <LockIcon size={12} className="inline mr-1" />
                                Lock {currentQLabel}
                            </button>
                        )}
                    </div>

                    {/* Account Groups */}
                    {QR_CATEGORIES.map(cat => {
                        const catAccounts = grouped[cat.id] || [];
                        if (catAccounts.length === 0) return null;
                        const activeAccounts = catAccounts.filter(a => !isDormant(a));
                        const dormantAccounts = catAccounts.filter(a => isDormant(a));
                        const catTotal = catAccounts.reduce((sum, a) => {
                            const v = getCurrentVal(a);
                            const val = v !== null ? v : (a.values[prevLabel] || 0);
                            return sum + val;
                        }, 0);

                        return (
                            <div key={cat.id} className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                                <div className="px-3 py-2 bg-gray-50 border-b border-gray-200">
                                    <div className="flex items-center gap-2">
                                        <h3 className="font-bold text-sm text-gray-700 flex-1 min-w-0">{cat.label}</h3>
                                        <span className="text-[10px] text-gray-400 uppercase tracking-wide w-28 text-right flex-shrink-0">Current</span>
                                        {showPct && <span className="text-[10px] text-gray-400 uppercase tracking-wide w-12 text-right flex-shrink-0">%</span>}
                                        <span className="text-[10px] text-gray-400 uppercase tracking-wide w-20 text-right flex-shrink-0">{prevLabel || 'Last Q'}</span>
                                        {showPct && <span className="text-[10px] text-gray-400 uppercase tracking-wide w-12 text-right flex-shrink-0">%</span>}
                                        <span className="text-[10px] text-gray-400 uppercase tracking-wide w-20 text-right flex-shrink-0">Change</span>
                                    </div>
                                    <div className="text-right">
                                        <span className={`text-sm font-semibold ${cat.id === 'debt' ? 'text-red-600' : 'text-gray-700'}`}>
                                            {cat.id === 'debt' ? '-' : ''}${fmt(Math.abs(catTotal))}
                                        </span>
                                    </div>
                                </div>
                                {activeAccounts.map(a => renderAccountRow(a, false))}
                                {dormantAccounts.length > 0 && (
                                    <button
                                        onClick={() => setExpandedDormant(prev => ({ ...prev, [cat.id]: !prev[cat.id] }))}
                                        className="w-full text-xs text-gray-400 py-2 hover:bg-gray-50 border-t border-gray-100"
                                    >
                                        {expandedDormant[cat.id] ? 'Hide' : 'Show'} {dormantAccounts.length} dormant account{dormantAccounts.length !== 1 ? 's' : ''}
                                    </button>
                                )}
                                {expandedDormant[cat.id] && dormantAccounts.map(a => renderAccountRow(a, true))}
                            </div>
                        );
                    })}

                    {/* Insights Section */}
                    {Object.keys(currentValues).length > 3 ? (() => {
                        // Find biggest movers
                        const movers = accounts
                            .map(a => {
                                const cur = getCurrentVal(a);
                                if (cur === null) return null;
                                const prev = a.values[prevLabel] || 0;
                                return { name: a.name, delta: cur - prev, cur, prev };
                            })
                            .filter(m => m && Math.abs(m.delta) > 100)
                            .sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta))
                            .slice(0, 5);

                        if (movers.length === 0) return null;

                        return (
                            <div className="bg-white rounded-lg border border-gray-200 p-3">
                                <h3 className="font-bold text-sm text-gray-700 mb-2">Biggest Movers</h3>
                                {movers.map(m => (
                                    <div key={m.name} className="flex justify-between items-center py-1.5">
                                        <span className="text-sm text-gray-600 truncate flex-1">{m.name}</span>
                                        <span className={`text-sm font-semibold ${m.delta > 0 ? 'text-green-600' : 'text-red-600'}`}>
                                            {m.delta > 0 ? '+' : '-'}${fmt(Math.abs(m.delta))}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        );
                    })() : null}

                    {/* Liquidity Breakdown */}
                    {(() => {
                        const liquidTotal = (grouped['liquid'] || []).reduce((s, a) => s + (getCurrentVal(a) ?? a.values[prevLabel] ?? 0), 0);
                        const illiquidTotal = (grouped['illiquid'] || []).concat(grouped['stock'] || []).reduce((s, a) => s + (getCurrentVal(a) ?? a.values[prevLabel] ?? 0), 0);
                        const debtTotal = (grouped['debt'] || []).reduce((s, a) => s + Math.abs(getCurrentVal(a) ?? a.values[prevLabel] ?? 0), 0);
                        const total = liquidTotal + illiquidTotal;
                        const liquidPct = total > 0 ? (liquidTotal / total * 100).toFixed(1) : '0.0';
                        const illiquidPct = total > 0 ? (illiquidTotal / total * 100).toFixed(1) : '0.0';

                        return (
                            <div className="bg-white rounded-lg border border-gray-200 p-3">
                                <h3 className="font-bold text-sm text-gray-700 mb-2">Breakdown</h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between text-sm">
                                        <span className="text-gray-600">Liquid</span>
                                        <span className="font-medium">${fmt(liquidTotal)} <span className="text-gray-400">({liquidPct}%)</span></span>
                                    </div>
                                    <div className="flex justify-between text-sm">
                                        <span className="text-gray-600">Illiquid + Stocks</span>
                                        <span className="font-medium">${fmt(illiquidTotal)} <span className="text-gray-400">({illiquidPct}%)</span></span>
                                    </div>
                                    <div className="flex justify-between text-sm">
                                        <span className="text-gray-600">Debt</span>
                                        <span className="font-medium text-red-600">-${fmt(debtTotal)}</span>
                                    </div>
                                    <div className="border-t border-gray-100 pt-2 flex justify-between text-sm font-bold">
                                        <span>Net</span>
                                        <span>${fmt(Math.abs(currentTotal))}</span>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* Net Worth Trend Chart */}
                    {(() => {
                        const labeledQ = quarters.filter(q => q.isLabeled).reverse(); // oldest first
                        if (labeledQ.length < 2) return null;
                        const totals = labeledQ.map(q => ({
                            label: q.label,
                            total: summaries['TOTAL']?.[q.label] || 0,
                        }));
                        const minVal = Math.min(...totals.map(t => t.total));
                        const maxVal = Math.max(...totals.map(t => t.total));
                        const range = maxVal - minVal || 1;
                        const padding = range * 0.1;
                        const yMin = minVal - padding;
                        const yMax = maxVal + padding;
                        const yRange = yMax - yMin;
                        const chartH = 160;
                        const leftMargin = 55;
                        const chartW = totals.length * 55 + leftMargin + 10;
                        const getY = (val) => chartH - ((val - yMin) / yRange) * (chartH - 10);

                        const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => yMin + yRange * f);
                        const fmtK = (n) => {
                            const abs = Math.abs(n);
                            if (abs >= 1000000) return (n / 1000000).toFixed(1) + 'M';
                            if (abs >= 1000) return (n / 1000).toFixed(0) + 'k';
                            return n.toFixed(0);
                        };

                        // Get data for selected quarter drill-down
                        const selQ = selectedQ;
                        const selIdx = selQ ? totals.findIndex(t => t.label === selQ) : -1;
                        const prevQLabel = selIdx > 0 ? totals[selIdx - 1].label : null;

                        return (
                            <div className="bg-white rounded-lg border border-gray-200 p-3">
                                <div className="flex items-center justify-between mb-3">
                                    <h3 className="font-bold text-sm text-gray-700">Net Worth Trend</h3>
                                    {selQ && (
                                        <button onClick={() => setSelectedQ(null)} className="text-xs text-indigo-600 font-medium">
                                            ✕ Close {selQ}
                                        </button>
                                    )}
                                </div>
                                <div style={{ overflowX: 'auto' }}>
                                    <svg width={chartW} height={chartH + 30} viewBox={`0 0 ${chartW} ${chartH + 30}`}>
                                        {yTicks.map((val, i) => (
                                            <g key={i}>
                                                <line x1={leftMargin} x2={chartW} y1={getY(val)} y2={getY(val)} stroke="#f3f4f6" strokeWidth="1" />
                                                <text x={leftMargin - 6} y={getY(val) + 3} textAnchor="end" fontSize="9" fill="#9ca3af">${fmtK(val)}</text>
                                            </g>
                                        ))}
                                        <polygon
                                            fill="rgba(99,102,241,0.08)"
                                            points={`${leftMargin + 25},${chartH} ${totals.map((t, i) => `${i * 55 + leftMargin + 25},${getY(t.total)}`).join(' ')} ${(totals.length - 1) * 55 + leftMargin + 25},${chartH}`}
                                        />
                                        <polyline
                                            fill="none"
                                            stroke="#6366f1"
                                            strokeWidth="2.5"
                                            strokeLinejoin="round"
                                            points={totals.map((t, i) => `${i * 55 + leftMargin + 25},${getY(t.total)}`).join(' ')}
                                        />
                                        {/* Selected quarter vertical line */}
                                        {selIdx >= 0 && (
                                            <line x1={selIdx * 55 + leftMargin + 25} x2={selIdx * 55 + leftMargin + 25} y1={0} y2={chartH} stroke="#6366f1" strokeWidth="1" strokeDasharray="4,3" opacity="0.5" />
                                        )}
                                        {/* Clickable dots */}
                                        {totals.map((t, i) => (
                                            <g key={i} style={{ cursor: 'pointer' }} onClick={() => setSelectedQ(selQ === t.label ? null : t.label)}>
                                                {/* Invisible larger hit area */}
                                                <circle cx={i * 55 + leftMargin + 25} cy={getY(t.total)} r="14" fill="transparent" />
                                                <circle cx={i * 55 + leftMargin + 25} cy={getY(t.total)} r={selQ === t.label ? 6 : 3.5} fill={selQ === t.label ? '#4f46e5' : '#6366f1'} stroke={selQ === t.label ? '#fff' : 'none'} strokeWidth="2" />
                                                <text x={i * 55 + leftMargin + 25} y={getY(t.total) - 10} textAnchor="middle" fontSize="8" fill="#6366f1" fontWeight="600">${fmtK(t.total)}</text>
                                            </g>
                                        ))}
                                        {totals.map((t, i) => (
                                            <text key={i} x={i * 55 + leftMargin + 25} y={chartH + 18} textAnchor="middle" fontSize="9" fill={selQ === t.label ? '#4f46e5' : '#9ca3af'} fontWeight={selQ === t.label ? '700' : '400'}>{t.label}</text>
                                        ))}
                                    </svg>
                                </div>

                                {/* Quarter drill-down panel */}
                                {selQ && (() => {
                                    const activeAccts = accounts.filter(a => {
                                        const val = a.values[selQ];
                                        return val && val !== 0;
                                    });
                                    // Group by category
                                    const catGroups = {};
                                    QR_CATEGORIES.forEach(cat => { catGroups[cat.id] = []; });
                                    activeAccts.forEach(a => {
                                        const g = catGroups[a.category] || catGroups['other'];
                                        g.push(a);
                                    });
                                    const qTotal = summaries['TOTAL']?.[selQ] || 0;
                                    const prevTotal = prevQLabel ? (summaries['TOTAL']?.[prevQLabel] || 0) : null;
                                    const qDelta = prevTotal !== null ? qTotal - prevTotal : null;

                                    return (
                                        <div className="mt-3 border-t border-gray-100 pt-3">
                                            <div className="flex justify-between items-center mb-3">
                                                <span className="text-sm font-bold text-indigo-700">{selQ} Snapshot</span>
                                                <div className="text-right">
                                                    <span className="text-sm font-bold">${fmt(qTotal)}</span>
                                                    {qDelta !== null && (
                                                        <span className={`text-xs ml-2 font-semibold ${qDelta >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                            {qDelta >= 0 ? '+' : '-'}${fmt(Math.abs(qDelta))}
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
                                                <thead>
                                                    <tr style={{ borderBottom: '2px solid #e5e7eb' }}>
                                                        <th style={{ textAlign: 'left', padding: '4px 8px', color: '#6b7280', fontWeight: 600, width: '50%' }}>Account</th>
                                                        <th style={{ textAlign: 'right', padding: '4px 8px', color: '#6b7280', fontWeight: 600, width: '25%' }}>Value</th>
                                                        <th style={{ textAlign: 'right', padding: '4px 8px', color: '#6b7280', fontWeight: 600, width: '25%' }}>QoQ Change</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {QR_CATEGORIES.map(cat => {
                                                        const catAccts = catGroups[cat.id] || [];
                                                        if (catAccts.length === 0) return null;
                                                        const catSum = catAccts.reduce((s, a) => {
                                                            const v = a.values[selQ] || 0;
                                                            return s + (a.category === 'debt' ? -Math.abs(v) : v);
                                                        }, 0);
                                                        const catPrevSum = prevQLabel ? catAccts.reduce((s, a) => {
                                                            const v = a.values[prevQLabel] || 0;
                                                            return s + (a.category === 'debt' ? -Math.abs(v) : v);
                                                        }, 0) : null;
                                                        const catDelta = catPrevSum !== null ? catSum - catPrevSum : null;
                                                        return (
                                                            <React.Fragment key={cat.id}>
                                                                <tr style={{ backgroundColor: '#f9fafb', borderTop: '1px solid #e5e7eb' }}>
                                                                    <td style={{ padding: '5px 8px', fontWeight: 700, color: '#374151' }}>{cat.label}</td>
                                                                    <td style={{ padding: '5px 8px', textAlign: 'right', fontWeight: 700, color: cat.id === 'debt' ? '#dc2626' : '#374151' }}>
                                                                        {cat.id === 'debt' ? '-' : ''}${fmt(Math.abs(catSum))}
                                                                    </td>
                                                                    <td style={{ padding: '5px 8px', textAlign: 'right', fontWeight: 600, color: catDelta > 0 ? '#16a34a' : catDelta < 0 ? '#dc2626' : '#9ca3af' }}>
                                                                        {catDelta !== null ? (catDelta !== 0 ? `${catDelta > 0 ? '+' : '-'}$${fmt(Math.abs(catDelta))}` : '—') : '—'}
                                                                    </td>
                                                                </tr>
                                                                {catAccts.map(a => {
                                                                    const v = a.values[selQ] || 0;
                                                                    const pv = prevQLabel ? (a.values[prevQLabel] || 0) : null;
                                                                    const d = pv !== null ? v - pv : null;
                                                                    return (
                                                                        <tr key={a.name} style={{ borderBottom: '1px solid #f3f4f6' }}>
                                                                            <td style={{ padding: '3px 8px 3px 20px', color: '#6b7280' }}>{a.name}</td>
                                                                            <td style={{ padding: '3px 8px', textAlign: 'right', color: '#374151', fontWeight: 500 }}>${fmt(Math.abs(v))}</td>
                                                                            <td style={{ padding: '3px 8px', textAlign: 'right', fontWeight: 500, color: d > 0 ? '#16a34a' : d < 0 ? '#dc2626' : '#9ca3af' }}>
                                                                                {d !== null ? (d !== 0 ? `${d > 0 ? '+' : '-'}$${fmt(Math.abs(d))}` : '—') : '—'}
                                                                            </td>
                                                                        </tr>
                                                                    );
                                                                })}
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                    <tr style={{ borderTop: '2px solid #6366f1', backgroundColor: '#eef2ff' }}>
                                                        <td style={{ padding: '6px 8px', fontWeight: 800, color: '#4338ca' }}>TOTAL</td>
                                                        <td style={{ padding: '6px 8px', textAlign: 'right', fontWeight: 800, color: '#4338ca' }}>${fmt(qTotal)}</td>
                                                        <td style={{ padding: '6px 8px', textAlign: 'right', fontWeight: 700, color: qDelta > 0 ? '#16a34a' : qDelta < 0 ? '#dc2626' : '#9ca3af' }}>
                                                            {qDelta !== null ? (qDelta !== 0 ? `${qDelta > 0 ? '+' : '-'}$${fmt(Math.abs(qDelta))}` : '—') : '—'}
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    );
                                })()}
                            </div>
                        );
                    })()}

                    {/* QoQ History Table */}
                    {(() => {
                        const labeledQ = quarters.filter(q => q.isLabeled); // newest first
                        if (labeledQ.length < 1) return null;
                        // Only show accounts that have data in at least one quarter
                        const activeAccts = accounts.filter(a =>
                            labeledQ.some(q => a.values[q.label] && a.values[q.label] !== 0)
                        );
                        // Group by category
                        const catGroups = {};
                        QR_CATEGORIES.forEach(cat => { catGroups[cat.id] = []; });
                        activeAccts.forEach(a => {
                            const g = catGroups[a.category] || catGroups['other'];
                            g.push(a);
                        });
                        const colW = showPct ? 120 : 90;

                        // Compute per-quarter totals for % calculation
                        const qTotals = {};
                        labeledQ.forEach(q => {
                            qTotals[q.label] = activeAccts.reduce((s, a) => s + Math.abs(a.values[q.label] || 0), 0);
                        });

                        // Check if account is inactive (no value in most recent 2 quarters)
                        const isInactive = (acct) => {
                            const recent = labeledQ.slice(0, 2);
                            return recent.every(q => !acct.values[q.label] || acct.values[q.label] === 0);
                        };

                        // Count dormant accounts
                        const dormantCount = activeAccts.filter(a => isInactive(a)).length;

                        return (
                            <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                                <div className="px-3 py-2 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
                                    <h3 className="font-bold text-sm text-gray-700">Quarter History</h3>
                                    {dormantCount > 0 && (
                                        <button
                                            onClick={() => setShowHistoryDormant(!showHistoryDormant)}
                                            className="text-[11px] text-gray-400 hover:text-gray-600 transition"
                                        >
                                            {showHistoryDormant ? 'Hide' : 'Show'} {dormantCount} inactive
                                        </button>
                                    )}
                                </div>
                                <div style={{ overflowX: 'auto' }}>
                                    <table style={{ borderCollapse: 'collapse', width: 'max-content', minWidth: '100%' }}>
                                        <thead>
                                            <tr>
                                                <th className="text-left text-xs text-gray-500 font-semibold py-2 px-3 border-b border-gray-200 sticky left-0 bg-white z-10" style={{ minWidth: 160 }}>Account</th>
                                                {labeledQ.map(q => (
                                                    <th key={q.label}
                                                        className={`text-right text-xs font-semibold py-2 px-2 border-b border-gray-200 cursor-pointer hover:text-indigo-600 ${selectedQ === q.label ? 'text-indigo-700 bg-indigo-50' : 'text-gray-500'}`}
                                                        style={{ minWidth: colW }}
                                                        onClick={() => setSelectedQ(selectedQ === q.label ? null : q.label)}
                                                        colSpan={showPct ? 2 : 1}
                                                    >
                                                        {q.label}
                                                    </th>
                                                ))}
                                            </tr>
                                            {showPct && (
                                                <tr>
                                                    <th className="sticky left-0 bg-white z-10 border-b border-gray-100" style={{ minWidth: 160 }}></th>
                                                    {labeledQ.map(q => (
                                                        <React.Fragment key={q.label + '_sub'}>
                                                            <th className={`text-right text-[10px] text-gray-400 py-1 px-1 border-b border-gray-100 ${selectedQ === q.label ? 'bg-indigo-50' : ''}`} style={{ minWidth: 60 }}>Value</th>
                                                            <th className={`text-right text-[10px] text-gray-400 py-1 px-1 border-b border-gray-100 ${selectedQ === q.label ? 'bg-indigo-50' : ''}`} style={{ minWidth: 40 }}>%</th>
                                                        </React.Fragment>
                                                    ))}
                                                </tr>
                                            )}
                                        </thead>
                                        <tbody>
                                            {QR_CATEGORIES.map(cat => {
                                                const catAccts = catGroups[cat.id] || [];
                                                if (catAccts.length === 0) return null;
                                                const visibleAccts = showHistoryDormant ? catAccts : catAccts.filter(a => !isInactive(a));
                                                if (visibleAccts.length === 0) return null;
                                                return [
                                                    <tr key={cat.id + '_hdr'}>
                                                        <td className="text-xs font-bold text-gray-600 py-1.5 px-3 bg-gray-50 border-b border-gray-100 sticky left-0 z-10" colSpan={1}>{cat.label}</td>
                                                        {labeledQ.map(q => {
                                                            const catSum = visibleAccts.reduce((s, a) => s + (a.values[q.label] || 0), 0);
                                                            const catPct = qTotals[q.label] > 0 ? (Math.abs(catSum) / qTotals[q.label] * 100) : 0;
                                                            return showPct ? (
                                                                <React.Fragment key={q.label}>
                                                                    <td className={`text-xs font-bold text-right py-1.5 px-2 bg-gray-50 border-b border-gray-100 ${cat.id === 'debt' ? 'text-red-600' : 'text-gray-600'} ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                                        {cat.id === 'debt' && catSum !== 0 ? '-' : ''}${fmt(Math.abs(catSum))}
                                                                    </td>
                                                                    <td className={`text-[10px] font-semibold text-right py-1.5 px-1 bg-gray-50 border-b border-gray-100 text-gray-400 ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                                        {catPct.toFixed(1)}%
                                                                    </td>
                                                                </React.Fragment>
                                                            ) : (
                                                                <td key={q.label} className={`text-xs font-bold text-right py-1.5 px-2 bg-gray-50 border-b border-gray-100 ${cat.id === 'debt' ? 'text-red-600' : 'text-gray-600'} ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                                    {cat.id === 'debt' && catSum !== 0 ? '-' : ''}${fmt(Math.abs(catSum))}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>,
                                                    ...visibleAccts.map(a => {
                                                        const inactive = isInactive(a);
                                                        return (
                                                            <tr key={a.name} className={`hover:bg-gray-50 ${inactive ? 'opacity-40' : ''}`}>
                                                                <td className={`text-xs py-1 px-3 pl-5 border-b border-gray-50 truncate sticky left-0 bg-white z-10 ${inactive ? 'text-gray-400 italic' : 'text-gray-600'}`} style={{ maxWidth: 200 }}>{a.name}</td>
                                                                {labeledQ.map(q => {
                                                                    const v = a.values[q.label] || 0;
                                                                    const pct = qTotals[q.label] > 0 ? (Math.abs(v) / qTotals[q.label] * 100) : 0;
                                                                    return showPct ? (
                                                                        <React.Fragment key={q.label}>
                                                                            <td className={`text-xs text-right py-1 px-2 border-b border-gray-50 ${v === 0 ? 'text-gray-300' : 'text-gray-700'} ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                                                {v !== 0 ? `$${fmt(Math.abs(v))}` : '—'}
                                                                            </td>
                                                                            <td className={`text-[10px] text-right py-1 px-1 border-b border-gray-50 text-gray-400 ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                                                {v !== 0 ? `${pct.toFixed(1)}%` : ''}
                                                                            </td>
                                                                        </React.Fragment>
                                                                    ) : (
                                                                        <td key={q.label} className={`text-xs text-right py-1 px-2 border-b border-gray-50 ${v === 0 ? 'text-gray-300' : 'text-gray-700'} ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                                            {v !== 0 ? `$${fmt(Math.abs(v))}` : '—'}
                                                                        </td>
                                                                    );
                                                                })}
                                                            </tr>
                                                        );
                                                    })
                                                ];
                                            })}
                                            {/* Total row */}
                                            <tr>
                                                <td className="text-xs font-bold text-gray-800 py-2 px-3 border-t-2 border-gray-300 sticky left-0 bg-white z-10">TOTAL</td>
                                                {labeledQ.map(q => showPct ? (
                                                    <React.Fragment key={q.label}>
                                                        <td className={`text-xs font-bold text-right py-2 px-2 border-t-2 border-gray-300 text-gray-800 ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                            ${fmt(summaries['TOTAL']?.[q.label] || 0)}
                                                        </td>
                                                        <td className={`text-[10px] font-bold text-right py-2 px-1 border-t-2 border-gray-300 text-gray-400 ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                            100%
                                                        </td>
                                                    </React.Fragment>
                                                ) : (
                                                    <td key={q.label} className={`text-xs font-bold text-right py-2 px-2 border-t-2 border-gray-300 text-gray-800 ${selectedQ === q.label ? 'bg-indigo-50' : ''}`}>
                                                        ${fmt(summaries['TOTAL']?.[q.label] || 0)}
                                                    </td>
                                                ))}
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };

        const HomeTab = ({ expenses, onEdit, onDelete, onNavigateToCard, onNavigateToBank }) => {
            const now = new Date();
            const [chartYear, setChartYear] = useState(String(now.getFullYear()));
            const [chartPeriod, setChartPeriod] = useState(String(now.getMonth() + 1).padStart(2, '0'));
            const [hoveredSlice, setHoveredSlice] = useState(null);
            const [drillCategory, setDrillCategory] = useState(null);

            // Get available years from expenses
            const years = useMemo(() => {
                const ySet = new Set();
                expenses.forEach(e => {
                    const d = parseDateToISO(e.date || e.timestamp);
                    if (d) ySet.add(d.substring(0, 4));
                });
                return Array.from(ySet).sort().reverse();
            }, [expenses]);

            const MONTH_LABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

            // Filter expenses (exclude _balanceOnly rows from UI)
            const filteredExpenses = useMemo(() => {
                let filtered = expenses.filter(e => !e._balanceOnly);
                if (chartYear) {
                    filtered = filtered.filter(e => {
                        const d = parseDateToISO(e.date || e.timestamp);
                        return d && d.startsWith(chartYear);
                    });
                }
                if (chartPeriod) {
                    const qMatch = chartPeriod.match(/^Q(\d)$/);
                    if (qMatch) {
                        const startMonth = (parseInt(qMatch[1]) - 1) * 3 + 1;
                        const qMonths = [startMonth, startMonth + 1, startMonth + 2].map(m => String(m).padStart(2, '0'));
                        filtered = filtered.filter(e => {
                            const d = parseDateToISO(e.date || e.timestamp);
                            return d && qMonths.some(m => d.substring(5, 7) === m);
                        });
                    } else {
                        // Individual month like '01', '02', etc.
                        filtered = filtered.filter(e => {
                            const d = parseDateToISO(e.date || e.timestamp);
                            return d && d.substring(5, 7) === chartPeriod;
                        });
                    }
                }
                return filtered;
            }, [expenses, chartYear, chartPeriod]);

            const byCategory = {};
            CATEGORIES.forEach(cat => {
                byCategory[cat.id] = {
                    id: cat.id,
                    label: cat.name,
                    value: 0,
                    emoji: cat.emoji,
                    color: cat.color
                };
            });

            filteredExpenses.forEach(e => {
                if (byCategory[e.category]) {
                    if (e.txnType === 'charge' && e.category !== 'card_payment' && e.category !== 'transfer') {
                        byCategory[e.category].value += e.amount;
                    }
                }
            });

            const categoryData = Object.values(byCategory)
                .filter(c => c.value > 0)
                .sort((a, b) => b.value - a.value);

            const recent = expenses.filter(e => !e._balanceOnly).slice(0, 5);

            // Compute balances from raw sheet columns (E=charge, F=deposit)
            const ccBalances = {};
            CREDIT_CARDS.forEach(card => {
                const acctExp = expenses.filter(e => e.account === card.id);
                ccBalances[card.id] = { ...card, total: calcAccountBalance(acctExp, card.id) };
            });
            const bankBalances = {};
            BANK_ACCOUNTS.forEach(bank => {
                const acctExp = expenses.filter(e => e.account === bank.id);
                bankBalances[bank.id] = { ...bank, total: calcAccountBalance(acctExp, bank.id) };
            });
            const totalCCBalance = Object.values(ccBalances).reduce((sum, c) => sum + c.total, 0);
            const totalBankBalance = Object.values(bankBalances).reduce((sum, b) => sum + b.total, 0);

            return (
                <div className="space-y-4 pb-24">
                    <div className="flex gap-3">
                        <div className="flex-1 bg-gradient-to-r from-red-500 to-red-600 text-white p-4 rounded-lg">
                            <p className="text-[10px] opacity-80 uppercase tracking-wide">Credit Cards</p>
                            <p className="text-xl font-bold mt-0.5">${fmt(totalCCBalance)}</p>
                            <p className="text-[10px] opacity-70 mt-0.5">{totalCCBalance < 0 ? 'owed' : totalCCBalance > 0 ? 'credit' : 'clear'}</p>
                        </div>
                        <div className="flex-1 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white p-4 rounded-lg">
                            <p className="text-[10px] opacity-80 uppercase tracking-wide">Bank Accounts</p>
                            <p className="text-xl font-bold mt-0.5">${fmt(totalBankBalance)}</p>
                            <p className="text-[10px] opacity-70 mt-0.5">{totalBankBalance >= 0 ? 'balance' : 'overdrawn'}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <h3 className="font-bold text-lg mb-2">Credit Cards</h3>
                            <div className="space-y-2">
                                {Object.values(ccBalances).map(card => (
                                    <div key={card.id} onClick={() => onNavigateToCard && onNavigateToCard(card.id)} className="bg-white p-3 rounded-lg border border-gray-200 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition">
                                        <div className="flex items-center gap-2">
                                            <div className="w-2 h-8 rounded-full" style={{ backgroundColor: card.color }} />
                                            <div>
                                                <span className="font-medium text-sm">{card.shortName}</span>
                                                <p className="text-xs text-gray-400">···{card.last4}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-1">
                                            <span className={`font-bold ${card.total < 0 ? 'text-red-600' : card.total > 0 ? 'text-green-600' : 'text-gray-500'}`}>${fmt(card.total)}</span>
                                            <ChevronRightIcon size={16} className="text-gray-300" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div>
                            <h3 className="font-bold text-lg mb-2">Bank Accounts</h3>
                            <div className="space-y-2">
                                {Object.values(bankBalances).map(bank => (
                                    <div key={bank.id} onClick={() => onNavigateToBank && onNavigateToBank(bank.id)} className="bg-white p-3 rounded-lg border border-gray-200 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition">
                                        <div className="flex items-center gap-2">
                                            <div className="w-2 h-8 rounded-full" style={{ backgroundColor: bank.color }} />
                                            <div>
                                                <span className="font-medium text-sm">{bank.shortName}</span>
                                                <p className="text-xs text-gray-400">···{bank.last4}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-1">
                                            <span className={`font-bold ${bank.total >= 0 ? 'text-green-600' : 'text-red-600'}`}>{bank.total < 0 ? '-' : ''}${fmt(bank.total)}</span>
                                            <ChevronRightIcon size={16} className="text-gray-300" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {(() => {
                        const totalValue = categoryData.reduce((sum, c) => sum + c.value, 0);
                        return (
                        <div>
                            <h3 className="font-bold text-lg mb-2">Spending by Category</h3>
                            <div className="flex flex-wrap gap-1.5 mb-2">
                                <button
                                    onClick={() => { setChartYear(''); setChartPeriod(''); setHoveredSlice(null); setDrillCategory(null); }}
                                    className={`px-3 py-1 rounded-full text-xs font-medium transition ${!chartYear ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                >All</button>
                                {years.map(y => (
                                    <button
                                        key={y}
                                        onClick={() => { setChartYear(chartYear === y ? '' : y); setChartPeriod(''); setHoveredSlice(null); setDrillCategory(null); }}
                                        className={`px-3 py-1 rounded-full text-xs font-medium transition ${chartYear === y ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}

                            {chartYear && (

                                    >Full Year</button>
                                    {['Q1','Q2','Q3','Q4'].map(q => {
                                        const qNum = parseInt(q[1]);
                                        const qFirstMonth = (qNum - 1) * 3; // 0-indexed

                                        return (
                                            <button
                                                key={q}
                                                disabled={isFuture}
                                                onClick={() => { if (!isFuture) { setChartPeriod(chartPeriod === q ? '' : q); setHoveredSlice(null); setDrillCategory(null); } }}
                                                className={`px-2.5 py-0.5 rounded-full text-[11px] font-medium transition ${isFuture ? 'bg-gray-50 text-gray-300 cursor-not-allowed' : chartPeriod === q ? 'bg-blue-100 text-blue-700' : 'bg-gray-50 text-gray-500 hover:bg-gray-100'}`}
                                            >{q}</button>
                                        );
                                    })}
                                    {MONTH_LABELS.map((label, i) => {

                            {categoryData.length === 0 ? (

                                <div className="flex flex-col md:flex-row items-center gap-4">

                                        <svg viewBox="0 0 200 200" style={{ width: '100%', height: '100%' }}>
                                            {categoryData.map((cat, i) => {
                                                const angle = (cat.value / totalValue) * 360;
                                                const startAngle = categoryData.slice(0, i).reduce((s, c) => s + (c.value / totalValue) * 360, 0);
                                                const endAngle = startAngle + angle;
                                                const isHovered = hoveredSlice === i;
                                                const r = isHovered ? 88 : 82;
                                                const startRad = (startAngle - 90) * Math.PI / 180;
                                                const endRad = (endAngle - 90) * Math.PI / 180;
                                                const x1 = 100 + r * Math.cos(startRad);
                                                const y1 = 100 + r * Math.sin(startRad);
                                                const x2 = 100 + r * Math.cos(endRad);
                                                const y2 = 100 + r * Math.sin(endRad);
                                                const largeArc = angle > 180 ? 1 : 0;
                                                const pathData = `M 100 100 L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
                                                return (
                                                    <path
                                                        key={i}
                                                        d={pathData}
                                                        fill={cat.color}
                                                        stroke="white"
                                                        strokeWidth="2"
                                                        onMouseEnter={() => setHoveredSlice(i)}
                                                        onMouseLeave={() => setHoveredSlice(null)}

                                        </svg>
                                        {hoveredSlice !== null && categoryData[hoveredSlice] && (
                                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                                <div className="bg-white/90 rounded-lg shadow px-3 py-1.5 text-center">
                                                    <p className="text-xs font-medium">{categoryData[hoveredSlice].emoji} {categoryData[hoveredSlice].label}</p>
                                                    <p className="text-sm font-bold">${fmt(categoryData[hoveredSlice].value)}</p>
                                                    <p className="text-[10px] text-gray-500">{((categoryData[hoveredSlice].value / totalValue) * 100).toFixed(1)}%</p>
                                                    <p className="text-[9px] text-blue-500 mt-0.5">tap to view transactions</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex-1 w-full max-h-48 overflow-y-auto space-y-1">
                                        {categoryData.map((cat, i) => (
                                            <div
                                                key={cat.label}
                                                className={`flex justify-between text-xs py-1 px-2 rounded cursor-pointer transition ${hoveredSlice === i ? 'bg-gray-100' : 'hover:bg-gray-50'}`}
                                                onMouseEnter={() => setHoveredSlice(i)}
                                                onMouseLeave={() => setHoveredSlice(null)}
                                                onClick={() => setDrillCategory(cat.id)}
                                            >
                                                <span className="flex items-center gap-1.5">
                                                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: cat.color }} />
                                                    <span className="text-sm">{cat.emoji}</span>
                                                    <span className="truncate">{cat.label}</span>
                                                </span>
                                                <span className="flex items-center gap-1 font-medium ml-2 flex-shrink-0">
                                                    ${fmt(cat.value)}
                                                    <ChevronRightIcon size={12} className="text-gray-300" />
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="mt-2 pt-2 border-t border-gray-100 text-right">
                                    <span className="text-sm text-gray-500">Total: </span>
                                    <span className="text-sm font-bold">${fmt(totalValue)}</span>
                                </div>
                            </div>
                            )}
                        </div>
                        );
                    })()}

                    {/* Category Drill-Down Modal */}
                    {drillCategory && (() => {
                        const catInfo = getCategoryById(drillCategory);
                        const drillExpenses = filteredExpenses
                            .filter(e => e.category === drillCategory && e.txnType === 'charge')
                            .sort((a, b) => new Date(parseDateToISO(b.date || b.timestamp)) - new Date(parseDateToISO(a.date || a.timestamp)));
                        const drillTotal = drillExpenses.reduce((sum, e) => sum + e.amount, 0);
                        // Group by merchant for summary
                        const byMerchant = {};
                        drillExpenses.forEach(e => {
                            const m = e.merchant || 'Unknown';
                            if (!byMerchant[m]) byMerchant[m] = { count: 0, total: 0 };
                            byMerchant[m].count++;
                            byMerchant[m].total += e.amount;
                        });
                        const merchantSummary = Object.entries(byMerchant).sort((a, b) => b[1].total - a[1].total);
                        return (
                            <div className="fixed inset-0 bg-black bg-opacity-50 z-40 flex items-end md:items-center md:justify-center" onClick={(e) => { if (e.target === e.currentTarget) setDrillCategory(null); }}>
                                <div className="bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-2xl max-h-[85vh] flex flex-col">
                                    <div className="flex items-center justify-between p-4 border-b border-gray-200">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xl">{catInfo?.emoji}</span>
                                            <div>
                                                <h3 className="font-bold text-lg">{catInfo?.name || drillCategory}</h3>
                                                <p className="text-xs text-gray-500">{drillExpenses.length} transaction{drillExpenses.length !== 1 ? 's' : ''} · ${fmt(drillTotal)}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setDrillCategory(null)} className="p-1.5 hover:bg-gray-100 rounded-lg">
                                            <XIcon size={20} />
                                        </button>
                                    </div>

                                    {/* Merchant breakdown */}
                                    {merchantSummary.length > 1 && (
                                        <div className="px-4 pt-3 pb-2 border-b border-gray-100">
                                            <p className="text-[10px] uppercase tracking-wider text-gray-400 mb-1.5">By Merchant</p>
                                            <div className="space-y-1">
                                                {merchantSummary.slice(0, 5).map(([name, data]) => (
                                                    <div key={name} className="flex justify-between items-center text-sm">
                                                        <div className="flex items-center gap-2 min-w-0">
                                                            <div className="w-full bg-gray-100 rounded-full h-1.5 flex-1" style={{ maxWidth: '60px' }}>
                                                                <div className="h-1.5 rounded-full" style={{ width: `${(data.total / drillTotal) * 100}%`, backgroundColor: catInfo?.color || '#6B7280' }} />
                                                            </div>
                                                            <span className="truncate">{name}</span>
                                                            <span className="text-gray-400 text-xs flex-shrink-0">×{data.count}</span>
                                                        </div>
                                                        <span className="font-medium ml-2 flex-shrink-0">${fmt(data.total)}</span>
                                                    </div>
                                                ))}
                                                {merchantSummary.length > 5 && (
                                                    <p className="text-xs text-gray-400">+{merchantSummary.length - 5} more</p>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* Transaction list */}
                                    <div className="flex-1 overflow-y-auto">
                                        {drillExpenses.map((expense, idx) => {
                                            const thisDate = parseDateToISO(expense.date || expense.timestamp);
                                            const prevDate = idx > 0 ? parseDateToISO(drillExpenses[idx-1].date || drillExpenses[idx-1].timestamp) : null;
                                            const showSep = idx === 0 || thisDate !== prevDate;
                                            return (
                                                <React.Fragment key={expense.rowIndex}>
                                                    {showSep && (
                                                        <div className="px-4 py-1.5 bg-gray-50 border-y border-gray-100">
                                                            <span className="text-xs font-medium text-gray-500">{new Date(thisDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}</span>
                                                        </div>
                                                    )}
                                                    <ExpenseRow
                                                        expense={expense}
                                                        onDelete={onDelete}
                                                        onUpdate={() => {}}
                                                        onEdit={onEdit}
                                                        hideAccount={false}
                                                    />
                                                </React.Fragment>
                                            );
                                        })}
                                        {drillExpenses.length === 0 && (
                                            <div className="p-8 text-center text-gray-400">No transactions found</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {recent.length > 0 && (
                        <div>
                            <h3 className="font-bold text-lg mb-2">Recent</h3>
                            <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                                {recent.map((expense, idx) => (
                                    <ExpenseRow
                                        key={expense.rowIndex}
                                        expense={expense}
                                        onDelete={onDelete}
                                        onUpdate={() => {}}
                                        onEdit={onEdit}
                                        showReconcile={false}
                                        showDateSeparator={idx === 0 || getDateKey(expense) !== getDateKey(recent[idx - 1])}
                                    />
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const PAGE_SIZE = 50;

        const AllTab = ({ expenses, onDelete, onUpdate, onEdit }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);

            const filtered = expenses.filter(e =>
                !e._balanceOnly &&
                (e.merchant.toLowerCase().includes(searchTerm.toLowerCase()) ||
                e.category.includes(searchTerm.toLowerCase()))
            );

            // Reset visible count when search changes
            const prevSearch = React.useRef(searchTerm);
            React.useEffect(() => {
                if (prevSearch.current !== searchTerm) {
                    setVisibleCount(PAGE_SIZE);
                    prevSearch.current = searchTerm;
                }
            }, [searchTerm]);

            const visible = filtered.slice(0, visibleCount);
            const hasMore = filtered.length > visibleCount;

            return (
                <div className="pb-24">
                    <div className="sticky top-0 bg-white p-3 border-b border-gray-200 flex gap-2 z-10">
                        <SearchIcon size={20} className="text-gray-400" />
                        <input
                            type="text"
                            placeholder="Search..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="flex-1 outline-none"
                        />
                        {filtered.length > 0 && (
                            <span className="text-xs text-gray-400 self-center whitespace-nowrap">{filtered.length}</span>
                        )}
                    </div>
                    <div className="bg-white border border-gray-200 overflow-hidden">
                        {filtered.length === 0 ? (
                            <div className="p-4 text-center text-gray-500">No expenses</div>
                        ) : (
                            <>
                                {visible.map((expense, idx) => (
                                    <ExpenseRow
                                        key={expense.rowIndex}
                                        expense={expense}
                                        onDelete={onDelete}
                                        onUpdate={(updated) => onUpdate(updated.rowIndex, updated)}
                                        onEdit={onEdit}
                                        showReconcile={false}
                                        showDateSeparator={idx === 0 || getDateKey(expense) !== getDateKey(visible[idx - 1])}
                                    />
                                ))}
                                {hasMore && (
                                    <button
                                        onClick={() => setVisibleCount(c => c + PAGE_SIZE)}
                                        className="w-full py-3 text-sm text-blue-600 font-medium bg-blue-50 hover:bg-blue-100 border-t border-gray-200"
                                    >
                                        Show more ({filtered.length - visibleCount} remaining)
                                    </button>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const SettingsDropdown = ({ user, onLogout, testMode, onToggleTestMode, onRefreshTestData }) => {
            const [open, setOpen] = useState(false);
            const [toggling, setToggling] = useState(false);
            const [refreshing, setRefreshing] = useState(false);

            return (
                <div className="relative">
                    <button
                        onClick={() => setOpen(!open)}
                        className="p-1 hover:bg-gray-200 rounded"
                    >
                        <span style={{ fontSize: '16px' }}>⚙️</span>
                    </button>
                    {open && (
                        <div className="absolute right-0 mt-2 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden z-20 min-w-[220px]">
                            <div className="px-4 py-3 border-b border-gray-200">
                                <div className="flex items-center gap-2">
                                    {user?.picture && <img src={user.picture} alt="" className="w-8 h-8 rounded-full" />}
                                    <div>
                                        <p className="font-medium">{user?.name}</p>
                                        <p className="text-xs text-gray-500">{user?.email}</p>
                                    </div>
                                </div>
                            </div>
                            <button
                                onClick={async () => {
                                    setToggling(true);
                                    await onToggleTestMode();
                                    setToggling(false);
                                    setOpen(false);
                                }}
                                disabled={toggling}
                                className="w-full px-4 py-2.5 text-left hover:bg-gray-50 flex items-center justify-between border-b border-gray-100"
                            >
                                <span className="flex items-center gap-2 text-sm">
                                    <span>{testMode ? '🧪' : '🔬'}</span>
                                    <span>{toggling ? 'Switching...' : (testMode ? 'Exit Test Mode' : 'Enter Test Mode')}</span>
                                </span>
                                {testMode && <span className="w-2 h-2 rounded-full bg-amber-400 animate-pulse" />}
                            </button>
                            {testMode && (
                                <button
                                    onClick={async () => {
                                        if (!confirm('This will replace your test data with a fresh copy of your real sheet. Continue?')) return;
                                        setRefreshing(true);
                                        await onRefreshTestData();
                                        setRefreshing(false);
                                        setOpen(false);
                                    }}
                                    disabled={refreshing}
                                    className="w-full px-4 py-2.5 text-left hover:bg-gray-50 flex items-center gap-2 text-sm border-b border-gray-100"
                                >
                                    <RefreshCwIcon size={14} className={refreshing ? 'animate-spin' : ''} />
                                    <span>{refreshing ? 'Refreshing...' : 'Refresh Test Data'}</span>
                                </button>
                            )}
                            <button
                                onClick={() => {
                                    onLogout();
                                    setOpen(false);
                                }}
                                className="w-full px-4 py-2.5 text-left text-red-600 hover:bg-red-50 flex items-center gap-2 text-sm"
                            >
                                <LogOutIcon size={18} /> Sign Out
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // ============ MAIN APP ============
        const App = () => {
            const { user, token, login, logout, authLoading, needsReconnect, reconnect } = useGoogleAuth();
            const { expenses, setExpenses, loading, fetchExpenses, appendExpense, updateExpense, deleteExpense, apiError } = useGoogleSheets(token);
            const { push: pushUndo, undo: undoAction, canUndo } = useUndoStack();

            const [activeTab, setActiveTab] = useState('home');
            const [showAddModal, setShowAddModal] = useState(false);
            const [editExpense, setEditExpense] = useState(null);
            const [selectedCard, setSelectedCard] = useState(CREDIT_CARDS[0]?.id || '');
            const [selectedBank, setSelectedBank] = useState(BANK_ACCOUNTS[0]?.id || '');
            const [toast, setToast] = useState('');
            const [confirmationData, setConfirmationData] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [testMode, setTestMode] = useState(_testMode);
            const [dismissedReminders, setDismissedReminders] = useState(() => {
                try { return JSON.parse(localStorage.getItem('dismissed_reminders') || '{}'); } catch { return {}; }
            });

            // Auto-detect completed quarters from the quarterly sheet
            const [quarterlyLockVersion, setQuarterlyLockVersion] = useState(0);
            useEffect(() => {
                if (!token) return;
                const checkQuarterlyData = async () => {
                    try {
                        const now = new Date();
                        const qNum = Math.floor(now.getMonth() / 3);
                        // Previous quarter's last month in YYYY.MM format
                        const prevQEnd = new Date(now.getFullYear(), qNum * 3 - 1, 1);
                        if (prevQEnd.getMonth() < 0) prevQEnd.setFullYear(prevQEnd.getFullYear() - 1);
                        const prevQLockLabel = prevQEnd.getFullYear() + '.' + String(prevQEnd.getMonth() + 1).padStart(2, '0');

                        const lockedQuarters = (() => { try { return JSON.parse(localStorage.getItem('qr_locked') || '[]'); } catch { return []; } })();
                        if (lockedQuarters.includes(prevQLockLabel)) return; // Already locked

                        // Fetch header row from quarterly sheet to find the column
                        const resp = await fetch(
                            'https://sheets.googleapis.com/v4/spreadsheets/' + QR_SHEET_ID + '/values/' + encodeURIComponent(QR_SHEET_TAB) + '!1:3?valueRenderOption=FORMATTED_VALUE',
                            { headers: { 'Authorization': 'Bearer ' + token } }
                        );
                        if (!resp.ok) return;
                        const sheetData = await resp.json();
                        const rows = sheetData.values || [];
                        if (rows.length < 2) return;

                        // Look for the quarter's column in header — try multiple formats
                        const headerRow = rows[0] || [];
                        const prevQ = qNum === 0 ? 4 : qNum;
                        const prevQYear = qNum === 0 ? now.getFullYear() - 1 : now.getFullYear();
                        const possibleLabels = [
                            prevQLockLabel,                          // "2026.03"
                            prevQLockLabel.replace('.0', '.'),       // "2026.3"
                            `Q${prevQ} ${prevQYear}`,                // "Q1 2026"
                            `Q${prevQ}`,                             // "Q1"
                        ];
                        let colIdx = -1;
                        for (let i = 0; i < headerRow.length; i++) {
                            const cell = String(headerRow[i]).trim();
                            if (possibleLabels.includes(cell)) {
                                colIdx = i;
                                break;
                            }
                        }
                        if (colIdx === -1) {
                            console.log('Quarterly auto-lock: no matching column found. Headers:', headerRow.slice(0, 10), 'Looking for:', possibleLabels);
                            return;
                        }

                        // Check if there's data in that column (row 2 or 3)
                        const hasData = rows.some((row, ri) => ri > 0 && row[colIdx] && String(row[colIdx]).trim() !== '');
                        if (hasData) {
                            // Auto-lock this quarter
                            const updated = [...lockedQuarters, prevQLockLabel];
                            try { localStorage.setItem('qr_locked', JSON.stringify(updated)); } catch {}
                            setQuarterlyLockVersion(v => v + 1); // trigger reminder recompute
                        }
                    } catch (err) {
                        console.error('Quarterly auto-lock check failed:', err);
                    }
                };
                checkQuarterlyData();
            }, [token]);

            // Build merchant→account map and overdue recurring list
            const displayExpensesApp = useMemo(() => expenses.filter(e => !e._balanceOnly), [expenses]);
            const merchantAccountMap = useMemo(() => buildMerchantAccountMap(displayExpensesApp), [displayExpensesApp]);
            const overdueRecurring = useMemo(() => getOverdueRecurring(displayExpensesApp), [displayExpensesApp, quarterlyLockVersion]);
            const visibleReminders = overdueRecurring.filter(r => {
                const dismissedAt = dismissedReminders[r.id];
                if (!dismissedAt) return true;
                // Re-show after 24 hours
                return Date.now() - dismissedAt > 24 * 60 * 60 * 1000;
            });
            const dismissReminder = (id) => {
                const updated = { ...dismissedReminders, [id]: Date.now() };
                setDismissedReminders(updated);
                localStorage.setItem('dismissed_reminders', JSON.stringify(updated));
            };

            // Quick-add from reminder: pre-fill the add modal
            const handleQuickAdd = (rec) => {
                setEditExpense({
                    _prefill: true,
                    merchant: rec.merchant,
                    account: rec.account,
                    category: rec.category,
                    txnType: rec.txnType,
                    amount: rec.lastAmount || rec.approxAmount || '',
                });
                setShowAddModal(true);
            };

            const handleToggleTestMode = async () => {
                if (!_testMode) {
                    // Entering test mode — set up if needed
                    const ok = await setupTestMode(token);
                    if (!ok) return;
                    _testMode = true;
                    localStorage.setItem('expense_test_mode', 'true');
                    setTestMode(true);
                    setToast('Test mode ON — using test data');
                } else {
                    // Exiting test mode
                    _testMode = false;
                    localStorage.setItem('expense_test_mode', 'false');
                    setTestMode(false);
                    setToast('Test mode OFF — back to real data');
                }
                // Re-fetch data from the now-active sheet
                setTimeout(() => fetchExpenses(), 300);
            };

            const handleRefreshTestData = async () => {
                const ok = await refreshTestSheet(token);
                if (ok) {
                    setToast('Test data refreshed from real sheet');
                    fetchExpenses();
                } else {
                    alert('Failed to refresh test data');
                }
            };

            const handleEditExpense = (expense) => {
                setEditExpense(expense);
                setShowAddModal(true);
            };

            const handleCloseModal = () => {
                setShowAddModal(false);
                setEditExpense(null);
            };

            const handleQuickMetrocard = async () => {
                // Get current date in ET timezone
                const etDate = new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
                pushUndo(expenses);
                await appendExpense({
                    merchant: 'Metrocard',
                    amount: 3.00,
                    category: 'transit',
                    account: 'reserve_chase',
                    notes: '',
                    receipt: '',
                    txnType: 'charge',
                    isCredit: false,
                    originalCurrency: 'USD',
                    originalAmount: 3.00,
                    person: user?.name || 'Taly',
                    date: etDate,
                });
                setToast('🚇 Metrocard added');
                setTimeout(() => setToast(''), 5000);
            };

            useEffect(() => {
                if (user && token) {
                    fetchExpenses();
                }
            }, [user, token, fetchExpenses]);

            const handleAddExpense = async (expenseData) => {
                setIsSaving(true);
                try {
                    pushUndo(expenses);
                    if (expenseData._dual) {
                        const entries = expenseData.entries;
                        for (let i = 0; i < entries.length; i++) {
                            const isLast = i === entries.length - 1;
                            await appendExpense(entries[i], { skipRefresh: !isLast });
                        }
                        setConfirmationData({
                            isDual: true,
                            entries: entries,
                            timestamp: new Date().toLocaleString(),
                        });
                    } else {
                        await appendExpense(expenseData);
                        setConfirmationData({
                            isDual: false,
                            merchant: expenseData.merchant,
                            amount: expenseData.amount,
                            category: expenseData.category,
                            account: expenseData.account,
                            txnType: expenseData.txnType,
                            date: expenseData.date,
                            receipt: expenseData.receipt || null,
                            person: expenseData.person,
                            timestamp: new Date().toLocaleString(),
                        });
                    }
                    setTimeout(() => setConfirmationData(null), 10000);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleUpdateExpense = async (rowIndex, updated) => {
                pushUndo(expenses);
                await updateExpense(rowIndex, updated);
            };

            const handleDeleteExpense = async (rowIndex) => {
                if (confirm('Delete this expense?')) {
                    pushUndo(expenses);
                    await deleteExpense(rowIndex);
                    setToast('Expense deleted');
                    setTimeout(() => setToast(''), 5000);
                }
            };

            const handleReconcile = (rowIndex, reconciled) => {
                const expense = expenses.find(e => e.rowIndex === rowIndex);
                if (expense) {
                    pushUndo(expenses);
                    // Save reconcile state to localStorage keyed by stable identity
                    const key = expense._recKey;
                    try { localStorage.setItem('rec_' + key, JSON.stringify(reconciled)); } catch {}
                    // Update in-memory state instantly — no network call needed
                    setExpenses(prev => prev.map(e => e.rowIndex === rowIndex ? { ...e, reconciled } : e));
                }
            };

            // Lock (cement) a batch of reconciled items so they can't be cleared
            const handleLockItems = (rowIndexes) => {
                pushUndo(expenses);
                rowIndexes.forEach(ri => {
                    const exp = expenses.find(e => e.rowIndex === ri);
                    if (exp) try { localStorage.setItem('rec_locked_' + exp._recKey, JSON.stringify(true)); } catch {}
                });
                setExpenses(prev => prev.map(e => rowIndexes.includes(e.rowIndex) ? { ...e, reconciledLocked: true } : e));
            };

            // Clear only unlocked reconciled items
            const handleClearUnlocked = (rowIndexes) => {
                pushUndo(expenses);
                rowIndexes.forEach(ri => {
                    const exp = expenses.find(e => e.rowIndex === ri);
                    if (exp) try { localStorage.setItem('rec_' + exp._recKey, JSON.stringify(false)); } catch {}
                });
                setExpenses(prev => prev.map(e => rowIndexes.includes(e.rowIndex) ? { ...e, reconciled: false } : e));
            };

            const handleUndo = async () => {
                const previousState = undoAction();
                if (previousState) {
                    setToast('Undo successful');
                    setTimeout(() => setToast(''), 5000);
                }
            };

            // Loading state while Firebase checks auth
            if (authLoading) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center" style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }}>
                        <div className="text-center">
                            <div className="w-10 h-10 border-3 border-blue-200 border-t-blue-500 rounded-full animate-spin mx-auto mb-3" style={{ borderWidth: 3 }}></div>
                            <p className="text-sm text-gray-400">Loading...</p>
                        </div>
                    </div>
                );
            }

            // Not signed in at all
            if (!user) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center px-4" style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }}>
                        <div className="bg-white rounded-2xl p-8 shadow-lg border border-gray-100 max-w-sm w-full text-center">
                            <div className="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <LockIcon size={24} className="text-blue-500" />
                            </div>
                            <h1 className="text-xl font-bold text-gray-900 mb-1">Expense Tracker</h1>
                            <p className="text-sm text-gray-400 mb-6">Sign in with Google to continue</p>
                            <button
                                onClick={login}
                                className="w-full flex items-center justify-center gap-3 py-3 px-4 bg-white border border-gray-200 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition-colors"
                            >
                                <svg width="18" height="18" viewBox="0 0 24 24">
                                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                </svg>
                                Sign in with Google
                            </button>
                            <p className="text-xs text-gray-300 mt-4">Restricted to authorized users only</p>
                        </div>
                    </div>
                );
            }

            // No more full-screen reconnect — handled by inline banner below

            return (
                <div className="flex flex-col h-screen bg-gray-50">
                    {/* Google token expired — inline reconnect banner (not full-screen) */}
                    {user && (!token || needsReconnect) && (
                        <div className="bg-amber-500 text-white text-center py-2 px-4 text-xs font-medium z-40 relative flex items-center justify-center gap-2">
                            <span>🔄 Google connection expired</span>
                            <button onClick={reconnect} className="ml-1 bg-white text-amber-600 px-3 py-0.5 rounded-full text-xs font-bold hover:bg-amber-50 transition-colors">Reconnect</button>
                        </div>
                    )}
                    {/* API Error Banner */}
                    {apiError && (
                        <div className="bg-red-500 text-white text-center py-2 px-4 text-xs font-medium z-40 relative">
                            ⚠️ {apiError}
                            <button onClick={reconnect} className="ml-2 underline font-bold">Reconnect</button>
                        </div>
                    )}
                    {/* Test Mode Banner */}
                    {testMode && (
                        <div className="bg-amber-400 text-amber-900 text-center py-1.5 text-xs font-bold tracking-wide z-40 relative">
                            🧪 TEST MODE — changes won't affect real data
                        </div>
                    )}
                    {/* Header */}
                    <div className={`sticky top-0 border-b border-gray-200 p-4 flex justify-between items-center z-30 ${testMode ? 'bg-amber-50' : 'bg-white'}`}>
                        <div>
                            <h1 className="text-xl font-bold">{testMode ? '🧪 Expenses (Test)' : 'Expenses'}</h1>
                            <p className="text-xs text-gray-400">Hi, {user?.name}</p>
                        </div>
                        <div className="flex items-center gap-1.5">
                            {canUndo && (
                                <button
                                    onClick={handleUndo}
                                    className="p-2 bg-amber-50 rounded-lg text-amber-600 hover:bg-amber-100"
                                    title="Undo"
                                >
                                    <Undo2Icon size={18} />
                                </button>
                            )}
                            <button
                                onClick={handleQuickMetrocard}
                                className="px-2.5 py-2 bg-cyan-50 text-cyan-700 rounded-lg hover:bg-cyan-100 text-xs font-semibold flex items-center gap-1"
                                title="Quick add Metrocard $3"
                            >
                                🚇 MTA
                            </button>
                            <button
                                onClick={() => { setEditExpense(null); setShowAddModal(true); }}
                                className="p-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200"
                            >
                                <CameraIcon size={18} />
                            </button>
                            <button
                                onClick={() => { setEditExpense(null); setShowAddModal(true); }}
                                className="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                            >
                                <PlusCircleIcon size={18} />
                            </button>
                            <SettingsDropdown user={user} onLogout={logout} testMode={testMode} onToggleTestMode={handleToggleTestMode} onRefreshTestData={handleRefreshTestData} />
                        </div>
                    </div>

                    {/* Content */}
                    <div className="flex-1 overflow-y-auto">
                        {loading ? (
                            <div className="flex items-center justify-center h-full">
                                <div className="text-center">
                                    <div className="inline-block animate-spin mb-4">
                                        <RefreshCwIcon size={32} className="text-blue-600" />
                                    </div>
                                    <p className="text-gray-600">Loading expenses...</p>
                                </div>
                            </div>
                        ) : (
                            <>
                                {/* Recurring transaction reminders */}
                                {visibleReminders.length > 0 && activeTab === 'home' && (
                                    <div className="px-4 pt-2 pb-1 space-y-2">
                                        {visibleReminders.map(rec => (
                                            <div key={rec.id} className={`flex items-center gap-2 rounded-xl px-3 py-2.5 ${rec._isEOQ ? 'bg-indigo-50 border border-indigo-200' : 'bg-amber-50 border border-amber-200'}`}>
                                                <span className="text-lg">{rec._isEOQ ? '📊' : '⏰'}</span>
                                                <div className="flex-1 min-w-0">
                                                    <p className={`text-sm font-semibold truncate ${rec._isEOQ ? 'text-indigo-900' : 'text-amber-900'}`}>{rec.label}</p>
                                                    <p className={`text-xs ${rec._isEOQ ? 'text-indigo-600' : 'text-amber-600'}`}>{rec.dueLabel}{rec.lastAmount ? ` · Last: $${Number(rec.lastAmount).toFixed(2)}` : ''}</p>
                                                </div>
                                                {rec._isEOQ ? (
                                                    <button
                                                        onClick={() => { setActiveTab('review'); dismissReminder(rec.id); }}
                                                        className="px-3 py-1.5 bg-indigo-500 text-white rounded-lg text-xs font-bold hover:bg-indigo-600 whitespace-nowrap"
                                                    >
                                                        Review →
                                                    </button>
                                                ) : (
                                                    <button
                                                        onClick={() => handleQuickAdd(rec)}
                                                        className="px-3 py-1.5 bg-amber-500 text-white rounded-lg text-xs font-bold hover:bg-amber-600 whitespace-nowrap"
                                                    >
                                                        + Log
                                                    </button>
                                                )}
                                                <button
                                                    onClick={() => dismissReminder(rec.id)}
                                                    className={`p-1 ${rec._isEOQ ? 'text-indigo-400 hover:text-indigo-600' : 'text-amber-400 hover:text-amber-600'}`}
                                                    title="Dismiss for 24h"
                                                >
                                                    ✕
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'home' && <HomeTab expenses={expenses} onEdit={handleEditExpense} onDelete={handleDeleteExpense} onNavigateToCard={(id) => { setSelectedCard(id); setActiveTab('cards'); }} onNavigateToBank={(id) => { setSelectedBank(id); setActiveTab('banks'); }} />}

                                {activeTab === 'all' && (
                                    <AllTab
                                        expenses={expenses}
                                        onDelete={handleDeleteExpense}
                                        onUpdate={handleUpdateExpense}
                                        onEdit={handleEditExpense}
                                    />
                                )}

                                {activeTab === 'cards' && (
                                    <div className="pb-24 p-4 space-y-4">
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                            {CREDIT_CARDS.map(card => (
                                                <button
                                                    key={card.id}
                                                    onClick={() => setSelectedCard(card.id)}
                                                    className={`whitespace-nowrap px-4 py-2 rounded-full font-medium transition ${selectedCard === card.id ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-800'}`}
                                                >
                                                    {card.shortName}
                                                </button>
                                            ))}
                                        </div>
                                        <AccountTabView
                                            accountId={selectedCard}
                                            expenses={expenses}
                                            onUpdate={handleUpdateExpense}
                                            onReconcile={handleReconcile}
                                            onDelete={handleDeleteExpense}
                                            onEdit={handleEditExpense}
                                            onLockItems={handleLockItems}
                                            onClearUnlocked={handleClearUnlocked}
                                        />
                                    </div>
                                )}

                                {activeTab === 'banks' && (
                                    <div className="pb-24 p-4 space-y-4">
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                            {BANK_ACCOUNTS.map(bank => (
                                                <button
                                                    key={bank.id}
                                                    onClick={() => setSelectedBank(bank.id)}
                                                    className={`whitespace-nowrap px-4 py-2 rounded-full font-medium transition ${selectedBank === bank.id ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-800'}`}
                                                >
                                                    {bank.shortName}
                                                </button>
                                            ))}
                                        </div>
                                        <AccountTabView
                                            accountId={selectedBank}
                                            expenses={expenses}
                                            onUpdate={handleUpdateExpense}
                                            onReconcile={handleReconcile}
                                            onDelete={handleDeleteExpense}
                                            onEdit={handleEditExpense}
                                            onLockItems={handleLockItems}
                                            onClearUnlocked={handleClearUnlocked}
                                        />
                                    </div>
                                )}

                                {activeTab === 'review' && (
                                    <div className="pb-24 p-4">
                                        <QuarterlyReview token={token} expenses={expenses} />
                                    </div>
                                )}
                            </>
                        )}
                    </div>

                    {/* Add/Edit Expense Modal */}
                    <AddExpenseModal
                        isOpen={showAddModal}
                        onClose={handleCloseModal}
                        onAdd={handleAddExpense}
                        onUpdate={handleUpdateExpense}
                        editExpense={editExpense}
                        token={token}
                        userName={user?.name}
                        expenses={expenses}
                        merchantAccountMap={merchantAccountMap}
                    />

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-2 z-30">
                        {[
                            { id: 'home', icon: HomeIcon, label: 'Home' },
                            { id: 'all', icon: ListIcon, label: 'All' },
                            { id: 'cards', icon: CreditCardIcon, label: 'Cards' },
                            { id: 'banks', icon: WalletIcon, label: 'Banks' },
                            { id: 'review', icon: BarChartIcon, label: 'Review' },
                        ].map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex flex-col items-center gap-1 p-2 rounded-lg transition ${activeTab === tab.id ? 'text-blue-600' : 'text-gray-500'}`}
                            >
                                <tab.icon size={24} />
                                <span className="text-xs font-medium">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Saving indicator */}
                    {isSaving && (
                        <div className="fixed inset-0 bg-black/20 flex items-center justify-center z-50" style={{ backdropFilter: 'blur(2px)' }}>
                            <div className="bg-white rounded-2xl p-6 shadow-xl flex flex-col items-center gap-3">
                                <div className="w-10 h-10 border-3 border-blue-200 border-t-blue-500 rounded-full animate-spin" style={{ borderWidth: 3 }}></div>
                                <span className="text-sm font-medium text-gray-600">Saving expense...</span>
                            </div>
                        </div>
                    )}

                    {/* Confirmation card after submission */}
                    {confirmationData && (() => {
                        const d = confirmationData;
                        const getCatDisplay = (catId) => {
                            const cat = CATEGORIES.find(c => c.id === catId);
                            return cat ? `${cat.emoji} ${cat.name}` : catId;
                        };
                        const getAcctDisplay = (acctId) => {
                            const acct = ALL_ACCOUNTS.find(a => a.id === acctId);
                            return acct ? acct.name : acctId;
                        };
                        const fmtAmt = (v) => parseFloat(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                        if (d.isDual) {
                            return (
                                <div className="fixed bottom-20 left-4 right-4 bg-white rounded-xl shadow-2xl border border-green-200 z-50 p-4 max-w-md mx-auto" style={{ animation: 'fadeIn 0.3s ease' }}>
                                    <div className="flex items-center justify-between mb-3">
                                        <div className="flex items-center gap-2">
                                            <span className="text-green-500 text-lg">✓</span>
                                            <span className="font-bold text-sm text-gray-800">Dual Entry Added</span>
                                        </div>
                                        <button onClick={() => setConfirmationData(null)} className="text-gray-400 hover:text-gray-600 text-xs">✕</button>
                                    </div>
                                    {d.entries.map((entry, idx) => (
                                        <div key={idx} className={`text-xs text-gray-600 py-1.5 ${idx > 0 ? 'border-t border-gray-100 mt-1.5' : ''}`}>
                                            <div className="flex justify-between"><span className="text-gray-400">Account</span><span className="font-medium">{getAcctDisplay(entry.account)}</span></div>
                                            <div className="flex justify-between"><span className="text-gray-400">Type</span><span className={entry.txnType === 'deposit' ? 'text-green-600' : 'text-red-600'}>{entry.txnType === 'deposit' ? 'Deposit' : 'Charge'} ${fmtAmt(entry.amount)}</span></div>
                                        </div>
                                    ))}
                                    {canUndo && <button onClick={() => { handleUndo(); setConfirmationData(null); }} className="mt-2 w-full text-center text-xs font-bold text-blue-600 py-1.5 bg-blue-50 rounded-lg">Undo</button>}
                                    <div className="mt-2 w-full bg-gray-100 rounded-full h-1 overflow-hidden"><div className="bg-green-400 h-full" style={{ animation: 'shrink 10s linear forwards' }}></div></div>
                                </div>
                            );
                        }

                        return (
                            <div className="fixed bottom-20 left-4 right-4 bg-white rounded-xl shadow-2xl border border-green-200 z-50 p-4 max-w-md mx-auto" style={{ animation: 'fadeIn 0.3s ease' }}>
                                <div className="flex items-center justify-between mb-3">
                                    <div className="flex items-center gap-2">
                                        <span className="text-green-500 text-lg">✓</span>
                                        <span className="font-bold text-sm text-gray-800">Expense Added</span>
                                    </div>
                                    <button onClick={() => setConfirmationData(null)} className="text-gray-400 hover:text-gray-600 text-xs">✕</button>
                                </div>
                                <div className="space-y-1.5 text-xs">
                                    <div className="flex justify-between"><span className="text-gray-400">Merchant</span><span className="font-semibold text-gray-800">{d.merchant}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-400">Amount</span><span className={`font-semibold ${d.txnType === 'charge' ? 'text-red-600' : 'text-green-600'}`}>${fmtAmt(d.amount)}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-400">Category</span><span className="text-gray-700">{getCatDisplay(d.category)}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-400">Account</span><span className="text-gray-700">{getAcctDisplay(d.account)}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-400">Date</span><span className="text-gray-700">{d.date}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-400">Type</span><span className="text-gray-700">{d.txnType === 'charge' ? 'Debit' : d.txnType === 'deposit' ? 'Deposit' : d.txnType === 'credit_refund' ? 'Credit/Refund' : d.txnType}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-400">Sheet Col C</span><span className="text-gray-700 text-[11px]">{SHEET_CARD_NAMES[d.account] || d.account}</span></div>
                                    {d.receipt && (() => {
                                        const driveMatch = d.receipt.match(/(?:id=|\/d\/)([a-zA-Z0-9_-]+)/);
                                        const driveFileId = driveMatch ? driveMatch[1] : null;
                                        return (
                                            <div className="pt-2 border-t border-gray-100">
                                                <div className="flex justify-between items-center mb-1.5">
                                                    <span className="text-gray-400">Receipt</span>
                                                    <a href={d.receipt} target="_blank" rel="noopener" className="text-blue-600 font-medium flex items-center gap-1 text-[11px]">
                                                        📎 Open in Drive
                                                    </a>
                                                </div>
                                                {driveFileId && (
                                                    <a href={d.receipt} target="_blank" rel="noopener" className="block rounded-lg overflow-hidden border border-gray-100 bg-gray-50">
                                                        <img
                                                            src={`https://drive.google.com/thumbnail?id=${driveFileId}&sz=w400`}
                                                            alt="Receipt"
                                                            className="w-full max-h-32 object-contain"
                                                            style={{ minHeight: 60 }}
                                                            onError={(e) => { e.target.style.display = 'none'; }}
                                                        />
                                                    </a>
                                                )}
                                            </div>
                                        );
                                    })()}
                                    {!d.receipt && (
                                        <div className="flex justify-between items-center pt-1 border-t border-gray-100">
                                            <span className="text-gray-400">Receipt</span>
                                            <span className="text-orange-500 text-[11px]">⚠ No file attached</span>
                                        </div>
                                    )}
                                </div>
                                {canUndo && <button onClick={() => { handleUndo(); setConfirmationData(null); }} className="mt-3 w-full text-center text-xs font-bold text-blue-600 py-1.5 bg-blue-50 rounded-lg">Undo</button>}
                                <div className="mt-2 w-full bg-gray-100 rounded-full h-1 overflow-hidden"><div className="bg-green-400 h-full" style={{ animation: 'shrink 10s linear forwards' }}></div></div>
                            </div>
                        );
                    })()}
                </div>
            );
        };

        // ============ RENDER ============
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
